<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zocial 0.2 (beta)</title>
    <style>
        :root {
            --primary: #2563eb; --primary-light: #60a5fa; --bg: #0a0a1a; --surface: #1a1a2e;
            --surface2: #16213e; --text: #ffffff; --text-secondary: #94a3b8;
            --border: rgba(37,99,235,0.15); --radius: 20px; --accent: #f97316;
            --gold: #f59e0b; --green: #10b981; --safe-bottom: env(safe-area-inset-bottom,16px);
        }
        .theme-light { --bg: #f1f5f9; --surface: #ffffff; --surface2: #e2e8f0; --text: #1e293b; --text-secondary: #64748b; --border: rgba(37,99,235,0.2); }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:hidden; }
        .app { width:100%; max-width:430px; height:100vh; height:100dvh; display:flex; flex-direction:column; background:var(--bg); position:relative; overflow:hidden; }
        
        .login-screen { position:fixed; inset:0; background:var(--bg); z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; max-width:430px; margin:0 auto; }
        .login-screen.hidden { display:none; }
        .login-logo-img { width:120px; height:120px; border-radius:25px; margin-bottom:16px; object-fit:cover; }
        .login-version { font-size:0.8rem; color:var(--text-secondary); margin-bottom:20px; }
        .login-tabs { display:flex; width:100%; background:var(--surface2); border-radius:25px; padding:4px; margin-bottom:20px; position:relative; }
        .login-tab-slider { position:absolute; top:4px; left:4px; height:calc(100% - 8px); width:calc(50% - 4px); background:var(--primary); border-radius:22px; transition:transform 0.35s; z-index:1; }
        .login-tab-slider.right { transform:translateX(100%); }
        .login-tab { flex:1; padding:12px; text-align:center; border-radius:22px; cursor:pointer; font-weight:600; color:var(--text-secondary); border:none; background:transparent; font-size:0.95rem; z-index:2; }
        .login-tab.active { color:white; }
        .login-form { width:100%; display:flex; flex-direction:column; gap:14px; }
        .login-form.hidden { display:none; }
        .login-input { width:100%; padding:14px 18px; border-radius:25px; border:2px solid var(--border); background:var(--surface); color:var(--text); font-size:1rem; outline:none; }
        .login-error { color:var(--accent); font-size:0.85rem; text-align:center; min-height:20px; }
        .login-btn { width:100%; padding:16px; border-radius:25px; border:none; background:var(--primary); color:white; font-size:1.1rem; font-weight:700; cursor:pointer; }
        
        .main-app { display:none; width:100%; height:100%; flex-direction:column; }
        .main-app.visible { display:flex; }
        .header { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; background:var(--surface); border-bottom:1px solid var(--border); z-index:100; }
        .header-left { display:flex; align-items:center; gap:10px; }
        .header-logo-img { width:42px; height:42px; border-radius:10px; object-fit:cover; }
        .logo-version { font-size:0.65rem; color:var(--text-secondary); }
        .icon-btn { width:38px; height:38px; border-radius:50%; background:var(--surface2); border:1px solid var(--border); color:var(--primary-light); font-size:1.2rem; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        
        .main-content { flex:1; overflow:hidden; position:relative; }
        .pages-container { display:flex; width:100%; height:100%; transition:transform 0.3s ease; }
        .page { min-width:100%; height:100%; overflow-y:auto; padding:16px; }
        .page::-webkit-scrollbar { width:0; }
        
        .post-card { background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:14px; border:1px solid var(--border); animation:postAppear 0.4s ease; }
        @keyframes postAppear { from{opacity:0;transform:scale(0.8) translateY(20px);} to{opacity:1;transform:scale(1) translateY(0);} }
        .post-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
        .post-avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-light)); display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; cursor:pointer; overflow:hidden; }
        .post-avatar img { width:100%; height:100%; object-fit:cover; }
        .post-username { font-weight:600; color:var(--primary-light); cursor:pointer; display:flex; align-items:center; gap:4px; }
        .post-time { font-size:0.7rem; color:var(--text-secondary); }
        .post-text { margin-bottom:12px; line-height:1.5; }
        .post-actions { display:flex; gap:20px; padding-top:8px; border-top:1px solid var(--border); }
        .post-action { display:flex; align-items:center; gap:6px; color:var(--primary-light); cursor:pointer; background:none; border:none; padding:6px 10px; border-radius:20px; font-size:0.85rem; }
        .post-action.liked { color:var(--accent); }
        .verified-badge { display:inline-block; width:16px; height:16px; background:var(--primary); border-radius:50%; font-size:0.6rem; color:white; text-align:center; line-height:16px; margin-left:2px; }
        
        .like-animation { position:fixed; pointer-events:none; z-index:999; font-size:2rem; animation:likeFloat 0.8s ease-out forwards; }
        @keyframes likeFloat { 0%{opacity:1;transform:translateY(0) scale(1);} 50%{opacity:1;transform:translateY(-40px) scale(1.3);} 100%{opacity:0;transform:translateY(-80px) scale(0.8);} }
        
        .profile-header { display:flex; align-items:center; gap:20px; padding:20px 0; }
        .profile-avatar { width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-light)); display:flex; align-items:center; justify-content:center; font-size:2.8rem; font-weight:700; flex-shrink:0; overflow:hidden; }
        .profile-avatar img { width:100%; height:100%; object-fit:cover; }
        .profile-info { flex:1; }
        .profile-name { font-size:1.5rem; font-weight:700; display:flex; align-items:center; gap:6px; }
        .profile-username { color:var(--primary-light); }
        .profile-stats { display:flex; justify-content:space-around; margin:20px 0; }
        .stat-item { text-align:center; cursor:pointer; }
        .stat-number { font-size:1.4rem; font-weight:700; color:var(--primary-light); }
        .stat-label { font-size:0.7rem; color:var(--text-secondary); }
        .btn { padding:10px 24px; border-radius:25px; border:none; font-weight:600; cursor:pointer; font-size:0.9rem; }
        .btn-primary { background:var(--primary); color:white; }
        .btn-outline { background:transparent; border:2px solid var(--primary); color:var(--primary-light); }
        .btn:active { transform:scale(0.95); }
        
        .chat-screen { position:fixed; inset:0; background:var(--bg); z-index:200; display:flex; flex-direction:column; transform:translateX(100%); transition:0.3s; max-width:430px; margin:0 auto; }
        .chat-screen.open { transform:translateX(0); }
        .chat-nav { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface); }
        .back-btn { background:none; border:none; color:var(--primary-light); font-size:1.4rem; cursor:pointer; }
        .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
        .msg-bubble { max-width:80%; padding:12px 16px; border-radius:20px; font-size:0.9rem; }
        .msg-bubble.incoming { background:var(--surface2); align-self:flex-start; }
        .msg-bubble.outgoing { background:var(--primary); color:white; align-self:flex-end; }
        .chat-input-bar { display:flex; gap:8px; padding:12px 16px; padding-bottom:calc(12px + var(--safe-bottom)); background:var(--surface); }
        .chat-input { flex:1; background:var(--surface2); border:1px solid var(--border); padding:12px 18px; border-radius:25px; color:var(--text); outline:none; }
        .send-btn { width:44px; height:44px; border-radius:50%; background:var(--primary); border:none; color:white; font-size:1.2rem; cursor:pointer; }
        
        .bottom-nav { display:flex; background:var(--surface); border-top:1px solid var(--border); padding:8px 10px; padding-bottom:calc(8px + var(--safe-bottom)); }
        .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; background:none; border:none; color:var(--primary-light); font-size:0.7rem; }
        .nav-item .nav-icon { font-size:1.5rem; }
        .nav-item.active { color:var(--primary); }
        
        .fab { position:fixed; bottom:100px; right:20px; width:56px; height:56px; border-radius:50%; background:var(--primary); color:white; font-size:2rem; border:none; box-shadow:0 8px 24px rgba(37,99,235,0.6); cursor:pointer; z-index:150; animation:fabPulse 2s infinite; }
        @keyframes fabPulse { 0%,100%{box-shadow:0 8px 24px rgba(37,99,235,0.6);} 50%{box-shadow:0 8px 32px rgba(37,99,235,0.9);} }
        .fab.hidden { display:none; }
        
        .bank-balance-card { background:linear-gradient(135deg,#1e3a5f,#162d4a); border-radius:var(--radius); padding:24px; text-align:center; margin:16px 0; border:2px solid #3b82f6; }
        .bank-amount { font-size:3rem; font-weight:800; color:var(--gold); }
        .bank-clicker { background:radial-gradient(circle,#2563eb,#1d4ed8); border-radius:50%; width:140px; height:140px; margin:16px auto; display:flex; align-items:center; justify-content:center; flex-direction:column; border:3px solid #3b82f6; cursor:pointer; }
        .bank-clicker:active { transform:scale(0.9); }
        .float-text { position:fixed; pointer-events:none; z-index:999; font-weight:700; color:var(--gold); animation:floatUp 1s ease-out forwards; }
        @keyframes floatUp { 0%{opacity:1;transform:translateY(0);} 100%{opacity:0;transform:translateY(-60px);} }
        
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:300; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:0.3s; }
        .modal-overlay.open { opacity:1; pointer-events:all; }
        .modal-sheet { background:var(--surface); width:100%; max-width:430px; border-radius:24px 24px 0 0; padding:20px; transform:translateY(100%); transition:0.3s; max-height:85vh; overflow-y:auto; }
        .modal-overlay.open .modal-sheet { transform:translateY(0); }
        .modal-input { width:100%; padding:14px; border-radius:20px; border:2px solid var(--border); background:var(--surface2); color:var(--text); outline:none; margin:8px 0; }
        
        .settings-item { display:flex; align-items:center; gap:12px; padding:16px; background:var(--surface); border-radius:14px; margin-bottom:8px; cursor:pointer; }
        .comment-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
        
        .welcome-overlay { position:fixed; inset:0; background:var(--bg); z-index:600; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px; }
        .welcome-title { font-size:2rem; font-weight:800; color:var(--primary-light); animation:scaleIn 0.5s ease; }
        @keyframes scaleIn { from{opacity:0;transform:scale(0.5);} to{opacity:1;transform:scale(1);} }
        
        .search-panel { position:fixed; top:0; left:0; right:0; bottom:0; background:var(--bg); z-index:250; display:flex; flex-direction:column; max-width:430px; margin:0 auto; transform:translateY(-100%); transition:transform 0.3s ease; }
        .search-panel.open { transform:translateY(0); }
        .search-panel-header { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface); }
        .search-panel-body { flex:1; overflow-y:auto; padding:16px; }
        .search-result-item { display:flex; align-items:center; gap:12px; padding:14px; background:var(--surface); border-radius:14px; margin-bottom:8px; cursor:pointer; border:1px solid var(--border); }
        
        .theme-switch { display:flex; width:100%; background:var(--surface2); border-radius:25px; padding:4px; position:relative; margin:12px 0; }
        .theme-switch .switch-slider { position:absolute; top:4px; left:4px; height:calc(100% - 8px); width:calc(50% - 4px); background:var(--primary); border-radius:22px; transition:transform 0.35s; z-index:1; }
        .theme-switch .switch-slider.right { transform:translateX(100%); }
        .theme-switch .switch-option { flex:1; padding:12px; text-align:center; border-radius:22px; cursor:pointer; font-weight:600; color:var(--text-secondary); border:none; background:transparent; font-size:0.9rem; z-index:2; }
        .theme-switch .switch-option.active { color:white; }
        
        @media (min-width:431px) { .app,.login-screen { border-radius:30px; height:95vh; } .chat-screen,.search-panel { border-radius:30px; } }
    </style>
</head>
<body>
<div class="login-screen" id="loginScreen">
    <img src="https://imgfy.ru/ib/JGoGzQlCDIcONHE_1778078416.webp" class="login-logo-img" alt="Zocial">
    <div class="login-version">версия 0.2 (beta) · zima.dev · © 2026</div>
    <div class="login-tabs" id="loginSwitch">
        <div class="login-tab-slider"></div>
        <button class="login-tab active" data-tab="login">вход</button>
        <button class="login-tab" data-tab="register">регистрация</button>
    </div>
    <div class="login-form" id="loginFormBlock">
        <input type="text" class="login-input" id="loginUsername" placeholder="никнейм" autocomplete="off">
        <input type="password" class="login-input" id="loginPassword" placeholder="пароль" autocomplete="off">
        <div class="login-error" id="loginError"></div>
        <button class="login-btn" id="loginSubmitBtn">войти</button>
    </div>
    <div class="login-form hidden" id="registerFormBlock">
        <input type="text" class="login-input" id="regName" placeholder="ваше имя" autocomplete="off">
        <input type="text" class="login-input" id="regUsername" placeholder="придумайте никнейм" autocomplete="off">
        <input type="password" class="login-input" id="regPassword" placeholder="пароль" autocomplete="off">
        <div class="login-error" id="regError"></div>
        <button class="login-btn" id="regSubmitBtn">зарегистрироваться</button>
    </div>
</div>

<div class="main-app" id="mainApp">
    <div class="app">
        <div class="header">
            <div class="header-left">
                <img src="https://imgfy.ru/ib/JGoGzQlCDIcONHE_1778078416.webp" class="header-logo-img" alt="Zocial">
                <span class="logo-version">0.2 beta</span>
            </div>
            <div class="header-actions"><button class="icon-btn" id="searchBtn">🔍</button></div>
        </div>
        <div class="main-content">
            <div class="pages-container" id="pagesContainer">
                <div class="page" id="feedPage"><div id="feedPosts"></div></div>
                <div class="page" id="bankPage"><div id="bankContent"></div></div>
                <div class="page" id="aiPage"><div id="aiContent"></div></div>
                <div class="page" id="chatsPage"><h3 style="color:var(--primary-light);margin-bottom:16px;">💬 сообщения</h3><button class="add-contact-btn" style="width:100%;padding:14px;background:var(--surface);border:2px dashed var(--primary);border-radius:14px;color:var(--primary-light);cursor:pointer;margin-bottom:12px;" id="addContactBtn">🔍 найти пользователя</button><div id="chatListContainer"></div></div>
                <div class="page" id="profilePage"><div id="profileContent"></div></div>
                <div class="page" id="contactPage"><div id="contactContent"></div></div>
                <div class="page" id="settingsPage"><div id="settingsContent"></div></div>
                <div class="page" id="aboutPage"><div style="text-align:center;padding:40px 20px;"><img src="https://imgfy.ru/ib/JGoGzQlCDIcONHE_1778078416.webp" style="width:120px;height:120px;border-radius:25px;margin-bottom:16px;" alt="Zocial"><p style="color:var(--text-secondary);">версия 0.2 (beta)</p><p style="margin-top:20px;color:var(--text-secondary);">социальная сеть с банком, чатами и AI</p><p style="margin-top:8px;color:var(--primary-light);">© 2026 zima.dev</p><button class="btn btn-outline" id="aboutBackBtn" style="margin-top:24px;">← назад</button></div></div>
            </div>
        </div>
        <button class="fab hidden" id="fabCreatePost">＋</button>

        <div class="search-panel" id="searchPanel">
            <div class="search-panel-header"><button class="back-btn" id="closeSearchPanel">←</button><input type="text" class="modal-input" id="searchInput" placeholder="поиск..." style="flex:1;margin:0;"></div>
            <div class="search-panel-body" id="searchResults"></div>
        </div>

        <div class="chat-screen" id="chatScreen">
            <div class="chat-nav"><button class="back-btn" id="closeChatBtn">←</button><span id="chatScreenName" style="font-weight:600;color:var(--primary-light);">чат</span></div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-bar"><input type="text" class="chat-input" id="chatInput" placeholder="сообщение..."><button class="send-btn" id="chatSendBtn">➤</button></div>
        </div>
        <div class="bottom-nav">
            <button class="nav-item active" data-page="feed"><span class="nav-icon">🏠</span> лента</button>
            <button class="nav-item" data-page="bank"><span class="nav-icon">🏦</span> банк</button>
            <button class="nav-item" data-page="ai"><span class="nav-icon">🧠</span> gray ai</button>
            <button class="nav-item" data-page="chats"><span class="nav-icon">💬</span> чаты</button>
            <button class="nav-item" data-page="profile"><span class="nav-icon">👤</span> профиль</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="createPostModal">
    <div class="modal-sheet"><h3 style="color:var(--primary-light);">📝 новый пост</h3><textarea class="modal-input" id="postTextInput" rows="3" placeholder="что у вас нового?"></textarea><div style="display:flex;gap:10px;margin-top:12px;"><button class="btn btn-outline" id="cancelPostBtn">отмена</button><button class="btn btn-primary" id="publishPostBtn">опубликовать</button></div></div></div>
<div class="modal-overlay" id="commentsModal"><div class="modal-sheet"><h3 style="color:var(--primary-light);">💬 комментарии</h3><div id="commentsList"></div><div style="display:flex;gap:8px;margin-top:12px;"><input class="modal-input" id="commentInput" placeholder="комментарий..." style="margin:0;flex:1;"><button class="btn btn-primary" id="commentSend">→</button></div><button class="btn btn-outline" id="closeComments" style="width:100%;margin-top:12px;">закрыть</button></div></div>
<div class="modal-overlay" id="bankTransferModal"><div class="modal-sheet" style="background:linear-gradient(135deg,#1e3a5f,#162d4a);border:2px solid #3b82f6;"><h3 style="color:var(--gold);text-align:center;">💸 перевод</h3><input class="modal-input" id="transferUsername" placeholder="никнейм" style="background:rgba(255,255,255,0.1);color:white;border-color:#3b82f6;"><input class="modal-input" type="number" id="transferAmount" placeholder="сумма" style="background:rgba(255,255,255,0.1);color:white;border-color:#3b82f6;"><div id="transferSuccess" style="text-align:center;color:var(--green);font-weight:700;margin-top:8px;display:none;">✅ успешно!</div><div style="display:flex;gap:10px;margin-top:12px;"><button class="btn btn-outline" id="cancelTransferBtn" style="color:white;border-color:white;">отмена</button><button class="btn btn-primary" id="confirmTransferBtn" style="background:var(--gold);color:#1e3a5f;">отправить</button></div></div></div>
<div class="modal-overlay" id="depositModal"><div class="modal-sheet"><h3 style="color:var(--primary-light);">🏦 вклад 2%/30с</h3><input class="modal-input" type="number" id="depositAmount" placeholder="сумма (мин. 100 🪙)"><div style="display:flex;gap:10px;margin-top:12px;"><button class="btn btn-outline" id="cancelDepositBtn">отмена</button><button class="btn btn-primary" id="confirmDepositBtn">вложить</button><button class="btn btn-outline" id="withdrawDepositBtn" style="color:var(--accent);border-color:var(--accent);">снять</button></div></div></div>
<div class="modal-overlay" id="editProfileModal"><div class="modal-sheet"><h3 style="color:var(--primary-light);">✏️ редактировать профиль</h3><div style="text-align:center;margin:12px 0;"><div class="profile-avatar" id="editAvatarPreview" style="margin:0 auto;width:80px;height:80px;font-size:2rem;"></div><input type="file" id="avatarInput" accept="image/*" style="display:none;"><button class="btn btn-outline" id="changeAvatarBtn" style="margin-top:8px;">📷 сменить аватар</button></div><input class="modal-input" id="editNameInput" placeholder="имя"><input class="modal-input" id="editBioInput" placeholder="о себе"><div style="display:flex;gap:10px;margin-top:12px;"><button class="btn btn-outline" id="cancelEditBtn">отмена</button><button class="btn btn-primary" id="saveEditBtn">сохранить</button></div></div></div>
<div class="modal-overlay" id="userListModal"><div class="modal-sheet"><h3 style="color:var(--primary-light);" id="userListTitle"></h3><div id="userListContent"></div><button class="btn btn-primary" id="closeUserListBtn" style="width:100%;margin-top:12px;">закрыть</button></div></div>

<script>
const API = window.location.origin + '/api';
const $ = id => document.getElementById(id);
async function apiReq(method, endpoint, body = null) {
    try { const o = { method, headers: { 'Content-Type': 'application/json' } }; if (body) o.body = JSON.stringify(body); const r = await fetch(API + endpoint, o); return await r.json(); }
    catch (e) { return { error: 'сервер недоступен' }; }
}

let currentUser = null, globalChats = {}, activeChatId = null, activeCommentsPostId = null, currentPage = 'feed';
let allPostsCache = [];
let verifiedList = ['snzhk'], allUsersCache = [];

function esc(t) { return String(t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[c]); }
function animateLike(x, y) { const el = document.createElement('div'); el.className = 'like-animation'; el.textContent = '❤️'; el.style.left = x + 'px'; el.style.top = y + 'px'; document.body.appendChild(el); setTimeout(() => el.remove(), 800); }
function isVerified(username) { return verifiedList.includes(username); }

function switchPage(page) {
    currentPage = page;
    const pages = ['feed', 'bank', 'ai', 'chats', 'profile', 'contact', 'settings', 'about'];
    $('pagesContainer').style.transform = `translateX(-${pages.indexOf(page) * 100}%)`;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const nav = document.querySelector(`[data-page="${page}"]`); if (nav) nav.classList.add('active');
    $('fabCreatePost').classList.toggle('hidden', page !== 'feed');
    if (page === 'feed') renderFeedFromCache();
    else if (page === 'bank') loadBank();
    else if (page === 'ai') loadAI();
    else if (page === 'chats') loadChats();
    else if (page === 'profile') loadProfile();
    else if (page === 'settings') loadSettings();
}
document.querySelectorAll('.nav-item').forEach(n => n.addEventListener('click', () => switchPage(n.dataset.page)));

async function initApp() {
    const v = await apiReq('GET', '/verified');
    if (Array.isArray(v)) verifiedList = v;
    const users = await apiReq('GET', '/users');
    if (Array.isArray(users)) allUsersCache = users;
}

function showApp() { $('loginScreen').classList.add('hidden'); $('mainApp').classList.add('visible'); switchPage('feed'); loadFeed(); loadChats(); }

async function login() {
    const u = $('loginUsername').value.trim().toLowerCase(), p = $('loginPassword').value.trim();
    if (!u || !p) { $('loginError').textContent = 'заполните поля'; return; }
    const r = await apiReq('POST', '/login', { username: u, password: p });
    if (r.error) { $('loginError').textContent = r.error; return; }
    currentUser = r.user; currentUser.username = u;
    localStorage.setItem('zocial_session', JSON.stringify(currentUser));
    await initApp(); showApp();
}

async function register() {
    const n = $('regName').value.trim(), u = $('regUsername').value.trim().toLowerCase(), p = $('regPassword').value.trim();
    if (!n || !u || !p) { $('regError').textContent = 'заполните все поля'; return; }
    if (u.length < 3) { $('regError').textContent = 'никнейм мин. 3 символа'; return; }
    if (p.length < 4) { $('regError').textContent = 'пароль мин. 4 символа'; return; }
    const r = await apiReq('POST', '/register', { name: n, username: u, password: p });
    if (r.error) { $('regError').textContent = r.error; return; }
    currentUser = { name: n, username: u };
    localStorage.setItem('zocial_session', JSON.stringify(currentUser));
    $('loginScreen').classList.add('hidden');
    await initApp();
    
    // Приветствие
    for (let i = 0; i < 30; i++) setTimeout(() => { const el = document.createElement('div'); el.className = 'confetti'; el.textContent = ['🎉','✨','❄️','🎊'][Math.floor(Math.random()*4)]; el.style.left = Math.random() * 100 + '%'; el.style.top = -(Math.random() * 100) + 'px'; document.body.appendChild(el); setTimeout(() => el.remove(), 2500); }, i * 30);
    const overlay = document.createElement('div'); overlay.className = 'welcome-overlay';
    overlay.innerHTML = `<div class="welcome-title">🎉 добро пожаловать!</div><p style="color:var(--text-secondary);">@${currentUser.username}</p><button class="btn btn-primary" style="margin-top:20px;">начать</button>`;
    overlay.querySelector('button').addEventListener('click', () => {
        overlay.remove();
        $('mainApp').classList.add('visible');
        switchPage('feed');
        loadFeed();
        loadChats();
    });
    document.body.appendChild(overlay);
}

// ЛЕНТА
async function loadFeed() { $('feedPosts').innerHTML = '<div style="text-align:center;padding:40px;">загрузка...</div>'; const posts = await apiReq('GET', '/posts'); allPostsCache = Array.isArray(posts) ? posts : []; renderFeedFromCache(); }
function renderFeedFromCache() { $('feedPosts').innerHTML = ''; if (!allPostsCache.length) { $('feedPosts').innerHTML = '<div style="text-align:center;padding:40px;">пока нет постов</div>'; return; } allPostsCache.forEach(post => renderPost(post, $('feedPosts'))); }
function renderPost(post, container, showDelete = false) {
    const card = document.createElement('div'); card.className = 'post-card';
    const liked = post.likedBy?.includes(currentUser?.username);
    const verified = isVerified(post.username);
    const isOwner = post.username === currentUser?.username;
    card.innerHTML = `${isOwner && showDelete ? `<button style="position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text-secondary);cursor:pointer;z-index:1;" data-pid="${post.id}">✕</button>` : ''}
        <div class="post-header"><div class="post-avatar">${(post.username||'?')[0].toUpperCase()}</div><div class="post-user-info" data-un="${post.username}"><div class="post-username">@${esc(post.username)}${verified ? '<span class="verified-badge">✓</span>' : ''}</div><div class="post-time">${post.time||''}</div></div></div>
        <div class="post-text">${esc(post.text||'')}</div>
        <div class="post-actions"><button class="post-action like-btn ${liked?'liked':''}" data-pid="${post.id}">${liked?'❤️':'🤍'} ${post.likes||0}</button><button class="post-action cmt-btn" data-pid="${post.id}">💬 ${(post.comments||[]).length}</button></div>`;
    card.querySelector('.post-avatar')?.addEventListener('click', () => openContact(post.username));
    card.querySelector('.post-user-info')?.addEventListener('click', () => openContact(post.username));
    container.appendChild(card);
    if (showDelete && isOwner) card.querySelector('[data-pid]')?.addEventListener('click', async e => { e.stopPropagation(); if (confirm('удалить?')) { await apiReq('DELETE', `/posts/${post.id}`); loadFeed(); } });
    card.querySelector('.like-btn')?.addEventListener('click', async function() { const r = await apiReq('POST', `/posts/${post.id}/like`, { username: currentUser.username }); if (r.error) return; post.likes = r.likes; this.classList.toggle('liked', r.liked); this.innerHTML = `${r.liked?'❤️':'🤍'} ${r.likes}`; if (r.liked) { const rect = this.getBoundingClientRect(); animateLike(rect.left+rect.width/2-16, rect.top-20); } });
    card.querySelector('.cmt-btn')?.addEventListener('click', () => openComments(post.id));
}

async function openComments(postId) { activeCommentsPostId = postId; const post = allPostsCache.find(p => p.id === postId); if (!post) return; $('commentsList').innerHTML = post.comments?.length ? post.comments.map(c => `<div class="comment-item"><div class="post-avatar" style="width:34px;height:34px;font-size:0.8rem;">${(c.author||'?')[0]}</div><div><div class="post-username" style="font-size:0.85rem;">@${esc(c.author)}</div><div>${esc(c.text)}</div></div></div>`).join('') : '<div style="text-align:center;padding:20px;">нет комментариев</div>'; $('commentInput').value = ''; $('commentsModal').classList.add('open'); }
$('closeComments').addEventListener('click', () => $('commentsModal').classList.remove('open'));
$('commentSend').addEventListener('click', async () => { const t = $('commentInput').value.trim(); if (!t || !activeCommentsPostId) return; await apiReq('POST', `/posts/${activeCommentsPostId}/comment`, { username: currentUser.username, text: t }); $('commentInput').value = ''; openComments(activeCommentsPostId); loadFeed(); });

$('fabCreatePost').addEventListener('click', () => { $('postTextInput').value = ''; $('createPostModal').classList.add('open'); });
$('cancelPostBtn').addEventListener('click', () => $('createPostModal').classList.remove('open'));
$('publishPostBtn').addEventListener('click', async () => {
    const text = $('postTextInput').value.trim();
    if (!text) return;
    await apiReq('POST', '/posts', { username: currentUser.username, text });
    $('createPostModal').classList.remove('open'); loadFeed();
});

// GRAY AI
function loadAI() {
    $('aiContent').innerHTML = `<div style="text-align:center;padding:20px;"><div style="font-size:4rem;">🧠</div><h2 style="color:var(--primary-light);">gray ai</h2><p style="color:var(--text-secondary);">нейросеть Zocial</p><div id="aiChat" style="text-align:left;margin:16px 0;max-height:50vh;overflow-y:auto;"></div><div style="display:flex;gap:8px;"><input class="modal-input" id="aiPrompt" placeholder="спроси что-нибудь..." style="flex:1;margin:0;"><button class="btn btn-primary" id="aiSend">→</button></div></div>`;
    $('aiSend').addEventListener('click', async () => {
        const prompt = $('aiPrompt').value.trim();
        if (!prompt) return;
        const chat = $('aiChat');
        chat.innerHTML += `<div class="msg-bubble outgoing" style="margin-bottom:8px;">${esc(prompt)}</div>`;
        $('aiPrompt').value = '';
        chat.innerHTML += '<div class="msg-bubble incoming" style="margin-bottom:8px;">думаю...</div>';
        chat.scrollTop = chat.scrollHeight;
        const r = await apiReq('POST', '/grayai', { prompt });
        chat.innerHTML = chat.innerHTML.replace('думаю...', esc(r.response || 'ошибка'));
        chat.scrollTop = chat.scrollHeight;
    });
}

// ЧАТЫ
async function loadChats() { if (!currentUser) return; const result = await apiReq('GET', '/chat/' + currentUser.username); globalChats = result || {}; $('chatListContainer').innerHTML = ''; const users = Object.keys(globalChats); if (!users.length) { $('chatListContainer').innerHTML = '<div style="text-align:center;padding:40px;">нет сообщений</div>'; return; } users.forEach(u => { const msgs = globalChats[u] || []; const div = document.createElement('div'); div.style.cssText = 'display:flex;align-items:center;gap:12px;padding:14px;background:var(--surface);border-radius:14px;margin-bottom:8px;cursor:pointer;'; div.innerHTML = `<div class="post-avatar" style="width:48px;height:48px;">${u[0].toUpperCase()}</div><div><div style="font-weight:600;">@${esc(u)}</div><div style="font-size:0.8rem;color:var(--text-secondary);">${msgs.length?msgs[msgs.length-1].text:''}</div></div>`; div.addEventListener('click', () => openChat(u)); $('chatListContainer').appendChild(div); }); }
function openChat(u) { activeChatId = u; $('chatScreenName').textContent = '@' + u; renderChatMsgs(); $('chatScreen').classList.add('open'); }
function closeChat() { $('chatScreen').classList.remove('open'); activeChatId = null; loadChats(); }
function renderChatMsgs() { $('chatMessages').innerHTML = ''; if (!activeChatId || !globalChats[activeChatId]) return; globalChats[activeChatId].forEach(m => { const b = document.createElement('div'); b.className = 'msg-bubble ' + (m.from === currentUser.username ? 'outgoing' : 'incoming'); b.textContent = m.text; $('chatMessages').appendChild(b); }); }
async function sendMsg() { const t = $('chatInput').value.trim(); if (!t || !activeChatId) return; await apiReq('POST', '/chat/send', { from: currentUser.username, to: activeChatId, text: t }); $('chatInput').value = ''; loadChats().then(() => { if (activeChatId) renderChatMsgs(); }); }
$('closeChatBtn').addEventListener('click', closeChat); $('chatSendBtn').addEventListener('click', sendMsg); $('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

// БАНК
async function loadBank() {
    const bank = await apiReq('GET', '/bank/' + currentUser.username);
    if (bank.error) return;
    $('bankContent').innerHTML = `<div class="bank-balance-card"><div style="color:#93c5fd;">баланс</div><div class="bank-amount" id="bankBalance">${(bank.balance||0).toLocaleString()} 🪙</div><div style="color:#94a3b8;">кликер: +${bank.click_level||1} | пассив: +${bank.passive_level||0}/сек</div></div><div class="bank-clicker" id="bankClicker"><div style="font-size:3rem;">🪙</div><div>+${bank.click_level||1}</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;"><button class="btn btn-outline" id="bankUpgrade">улучшить<br><small>${((bank.click_level||1)*2*50).toLocaleString()} 🪙</small></button><button class="btn btn-outline" id="bankPassive">пассивный<br><small>${(((bank.passive_level||0)+1)*100).toLocaleString()} 🪙</small></button><button class="btn btn-outline" id="bankTransfer">💸 перевод</button></div>`;
    $('bankClicker').addEventListener('click', async function(e) { const r = await apiReq('POST', '/bank/click', { username: currentUser.username }); if (!r.error) $('bankBalance').textContent = (r.balance||0).toLocaleString() + ' 🪙'; });
    $('bankUpgrade').addEventListener('click', async () => { const r = await apiReq('POST', '/bank/upgrade', { username: currentUser.username }); if (!r.error) loadBank(); else alert(r.error); });
    $('bankPassive').addEventListener('click', async () => { const r = await apiReq('POST', '/bank/passive', { username: currentUser.username }); if (!r.error) loadBank(); else alert(r.error); });
    $('bankTransfer').addEventListener('click', () => { $('transferUsername').value = ''; $('transferAmount').value = ''; $('transferSuccess').style.display = 'none'; $('bankTransferModal').classList.add('open'); });
}
$('confirmTransferBtn').addEventListener('click', async () => { const to = $('transferUsername').value.trim(), amount = parseInt($('transferAmount').value); if (!to || !amount || amount < 1) return; const r = await apiReq('POST', '/bank/transfer', { from: currentUser.username, to, amount }); if (r.error) { alert(r.error); return; } $('transferSuccess').style.display = 'block'; setTimeout(() => { $('bankTransferModal').classList.remove('open'); loadBank(); loadChats(); }, 1200); });
$('cancelTransferBtn').addEventListener('click', () => $('bankTransferModal').classList.remove('open'));

// ПРОФИЛЬ
async function loadProfile() {
    const bank = await apiReq('GET', '/bank/' + currentUser.username);
    const myPosts = allPostsCache.filter(p => p.username === currentUser.username);
    const subs = await apiReq('GET', '/subs/' + currentUser.username);
    const followers = allUsersCache.filter(u => subs.includes(u.username)).length;
    const verified = isVerified(currentUser.username);
    $('profileContent').innerHTML = `<div class="profile-header"><div class="profile-avatar">${currentUser.name[0]}</div><div class="profile-info"><div class="profile-name">${esc(currentUser.name)}${verified?'<span class="verified-badge" style="width:20px;height:20px;font-size:0.8rem;line-height:20px;">✓</span>':''}</div><div class="profile-username">@${esc(currentUser.username)}</div></div></div><div class="profile-stats"><div class="stat-item"><div class="stat-number">${myPosts.length}</div><div class="stat-label">постов</div></div><div class="stat-item" id="statSubs"><div class="stat-number">${subs.length}</div><div class="stat-label">подписок</div></div><div class="stat-item" id="statFollowers"><div class="stat-number">${followers}</div><div class="stat-label">подписчиков</div></div><div class="stat-item"><div class="stat-number">${(bank.balance||0).toLocaleString()}</div><div class="stat-label">🪙</div></div></div><div style="display:flex;gap:10px;margin:16px 0;"><button class="btn btn-primary" id="profileEditBtn">✏️ редактировать</button><button class="btn btn-outline" id="profileSettingsBtn">⚙️ настройки</button></div><h4 style="color:var(--primary-light);margin:16px 0;">мои посты</h4><div id="myPostsList"></div>`;
    const c = $('myPostsList');
    if (!myPosts.length) c.innerHTML = '<div style="text-align:center;padding:20px;">нет постов</div>';
    else myPosts.forEach(p => renderPost(p, c, true));
    $('profileEditBtn').addEventListener('click', () => {
        $('editNameInput').value = currentUser.name; $('editBioInput').value = currentUser.bio || '';
        $('editProfileModal').classList.add('open');
    });
    $('profileSettingsBtn').addEventListener('click', () => switchPage('settings'));
}
$('saveEditBtn').addEventListener('click', async () => {
    const name = $('editNameInput').value.trim() || currentUser.name;
    const bio = $('editBioInput').value.trim();
    const r = await apiReq('POST', '/profile/update', { username: currentUser.username, name, bio });
    if (!r.error) { currentUser = r.user; currentUser.username = currentUser.username; localStorage.setItem('zocial_session', JSON.stringify(currentUser)); $('editProfileModal').classList.remove('open'); switchPage('profile'); loadProfile(); }
});
$('cancelEditBtn').addEventListener('click', () => $('editProfileModal').classList.remove('open'));

// КОНТАКТ
async function openContact(username) {
    if (username === currentUser.username) { switchPage('profile'); return; }
    let user = allUsersCache.find(u => u.username === username);
    if (!user) { const r = await apiReq('GET', '/users/' + username); if (!r.error) user = r; }
    if (!user) { alert('пользователь не найден'); return; }
    const subs = await apiReq('GET', '/subs/' + currentUser.username);
    const isSub = subs.includes(username);
    const verified = isVerified(username);
    switchPage('contact');
    $('contactContent').innerHTML = `<div class="profile-header"><div class="profile-avatar">${user.avatar?`<img src="${user.avatar}">`:user.name[0]}</div><div class="profile-info"><div class="profile-name">${esc(user.name)}${verified?'<span class="verified-badge" style="width:20px;height:20px;font-size:0.8rem;line-height:20px;">✓</span>':''}</div><div class="profile-username">@${esc(username)}</div></div></div><div style="display:flex;gap:10px;margin:16px 0;"><button class="btn btn-primary" id="contactChatBtn">💬 написать</button><button class="btn btn-outline" id="contactSubBtn">${isSub?'✅ подписан':'➕ подписаться'}</button><button class="btn btn-outline" id="contactBackBtn">← назад</button></div>`;
    $('contactChatBtn').addEventListener('click', () => openChat(username));
    $('contactSubBtn').addEventListener('click', async () => { const r = await apiReq('POST', '/subs/toggle', { subscriber: currentUser.username, target: username }); $('contactSubBtn').textContent = r.subscribed ? '✅ подписан' : '➕ подписаться'; });
    $('contactBackBtn').addEventListener('click', () => switchPage('feed'));
}

// НАСТРОЙКИ
function loadSettings() {
    const isLight = document.body.classList.contains('theme-light');
    $('settingsContent').innerHTML = `<h3 style="color:var(--primary-light);margin-bottom:24px;">⚙️ настройки</h3><p style="color:var(--text-secondary);margin-bottom:8px;">тема</p><div class="theme-switch" id="themeSwitch"><div class="switch-slider ${isLight ? 'right' : ''}"></div><button class="switch-option ${!isLight ? 'active' : ''}" data-theme="dark">🌙 тёмная</button><button class="switch-option ${isLight ? 'active' : ''}" data-theme="light">☀️ светлая</button></div><div class="settings-item" id="setAbout"><span>ℹ️</span><span style="flex:1;">о приложении</span></div><div class="settings-item" id="setLogout"><span>🚪</span><span style="color:var(--accent);">выйти</span></div>`;
    document.querySelectorAll('#themeSwitch .switch-option').forEach(btn => btn.addEventListener('click', function() { const t = this.dataset.theme; document.querySelectorAll('#themeSwitch .switch-option').forEach(b => b.classList.remove('active')); this.classList.add('active'); document.querySelector('#themeSwitch .switch-slider').classList.toggle('right', t === 'light'); document.body.classList.toggle('theme-light', t === 'light'); localStorage.setItem('zc_theme', t); }));
    $('setAbout').addEventListener('click', () => { $('aboutBackBtn').onclick = () => switchPage('settings'); switchPage('about'); });
    $('setLogout').addEventListener('click', () => { if (confirm('выйти?')) { localStorage.removeItem('zocial_session'); location.reload(); } });
}

// ПОИСК
$('searchBtn').addEventListener('click', () => { $('searchPanel').classList.add('open'); $('searchInput').value = ''; $('searchResults').innerHTML = '<div style="text-align:center;padding:40px;">введите запрос</div>'; setTimeout(() => $('searchInput').focus(), 300); });
$('closeSearchPanel').addEventListener('click', () => $('searchPanel').classList.remove('open'));
let searchTimeout;
$('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(async () => {
        const q = $('searchInput').value.trim();
        if (!q) { $('searchResults').innerHTML = '<div style="text-align:center;padding:40px;">введите запрос</div>'; return; }
        const results = await apiReq('GET', '/users/search?q=' + encodeURIComponent(q));
        if (!results?.length) { $('searchResults').innerHTML = '<div style="text-align:center;padding:40px;">ничего не найдено</div>'; return; }
        $('searchResults').innerHTML = results.map(u => `<div class="search-result-item" data-u="${u.username}"><div class="post-avatar" style="width:44px;height:44px;font-size:0.9rem;">${u.avatar ? `<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : (u.name||u.username)[0].toUpperCase()}</div><div style="flex:1;"><div style="font-weight:600;">${esc(u.name)}${isVerified(u.username)?' <span class="verified-badge">✓</span>':''}</div><div style="color:var(--primary-light);font-size:0.85rem;">@${esc(u.username)}</div></div></div>`).join('');
        $('searchResults').querySelectorAll('.search-result-item').forEach(el => el.addEventListener('click', () => { $('searchPanel').classList.remove('open'); openContact(el.dataset.u); }));
    }, 300);
});
$('addContactBtn').addEventListener('click', () => { $('searchPanel').classList.add('open'); $('searchInput').value = ''; setTimeout(() => $('searchInput').focus(), 300); });

// ПЕРЕКЛЮЧАТЕЛЬ ВХОДА
document.querySelectorAll('.login-tab').forEach(tab => tab.addEventListener('click', function() {
    document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active')); this.classList.add('active');
    document.querySelector('.login-tab-slider').classList.toggle('right', this.dataset.tab === 'register');
    $('loginFormBlock').classList.toggle('hidden', this.dataset.tab === 'register');
    $('registerFormBlock').classList.toggle('hidden', this.dataset.tab === 'login');
}));
$('loginSubmitBtn').addEventListener('click', login);
$('regSubmitBtn').addEventListener('click', register);

// АВТОВХОД
(async () => {
    if (localStorage.getItem('zc_theme') === 'light') document.body.classList.add('theme-light');
    await initApp();
    const session = localStorage.getItem('zocial_session');
    if (session) {
        try {
            const saved = JSON.parse(session);
            const r = await apiReq('POST', '/session', { username: saved.username });
            if (r.error) { localStorage.removeItem('zocial_session'); $('loginScreen').classList.remove('hidden'); return; }
            currentUser = r.user; currentUser.username = saved.username;
            showApp();
        } catch (e) { localStorage.removeItem('zocial_session'); $('loginScreen').classList.remove('hidden'); }
    } else { $('loginScreen').classList.remove('hidden'); }
})();
</script>
