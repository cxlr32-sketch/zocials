<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>❄️ Zocial</title>
    <style>
        :root {
            --primary: #2563eb; --primary-light: #60a5fa; --bg: #0a0a1a; --surface: #1a1a2e;
            --surface2: #16213e; --text: #ffffff; --text-secondary: #94a3b8;
            --border: rgba(37,99,235,0.15); --radius: 20px; --accent: #f97316;
            --gold: #f59e0b; --green: #10b981; --safe-bottom: env(safe-area-inset-bottom,16px);
        }
        .theme-light { --bg: #f1f5f9; --surface: #ffffff; --surface2: #e2e8f0; --text: #1e293b; --text-secondary: #64748b; --border: rgba(37,99,235,0.2); }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:hidden; }
        .app { width:100%; max-width:430px; height:100vh; height:100dvh; display:flex; flex-direction:column; background:var(--bg); position:relative; overflow:hidden; }
        .login-screen { position:fixed; inset:0; background:var(--bg); z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; max-width:430px; margin:0 auto; }
        .login-screen.hidden { display:none; }
        .login-logo { font-size:3rem; font-weight:800; color:var(--primary-light); margin-bottom:24px; }
        .login-tabs { display:flex; width:100%; background:var(--surface2); border-radius:25px; padding:4px; margin-bottom:20px; position:relative; }
        .login-tab-slider { position:absolute; top:4px; left:4px; height:calc(100% - 8px); width:calc(50% - 4px); background:var(--primary); border-radius:22px; transition:transform 0.35s; z-index:1; }
        .login-tab-slider.right { transform:translateX(100%); }
        .login-tab { flex:1; padding:12px; text-align:center; border-radius:22px; cursor:pointer; font-weight:600; color:var(--text-secondary); border:none; background:transparent; font-size:0.95rem; z-index:2; }
        .login-tab.active { color:white; }
        .login-form { width:100%; display:flex; flex-direction:column; gap:14px; }
        .login-form.hidden { display:none; }
        .login-input { width:100%; padding:14px 18px; border-radius:25px; border:2px solid var(--border); background:var(--surface); color:var(--text); font-size:1rem; outline:none; }
        .login-input:focus { border-color:var(--primary); }
        .login-error { color:var(--accent); font-size:0.85rem; text-align:center; min-height:20px; }
        .login-btn { width:100%; padding:16px; border-radius:25px; border:none; background:var(--primary); color:white; font-size:1.1rem; font-weight:700; cursor:pointer; }
        .main-app { display:none; width:100%; height:100%; flex-direction:column; }
        .main-app.visible { display:flex; }
        .header { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; background:var(--surface); border-bottom:1px solid var(--border); z-index:100; }
        .logo { font-size:1.6rem; font-weight:800; color:var(--primary-light); }
        .icon-btn { width:38px; height:38px; border-radius:50%; background:var(--surface2); border:1px solid var(--border); color:var(--primary-light); font-size:1.2rem; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .main-content { flex:1; overflow:hidden; position:relative; }
        .pages-container { display:flex; width:100%; height:100%; transition:transform 0.3s ease; }
        .page { min-width:100%; height:100%; overflow-y:auto; padding:16px; }
        .page::-webkit-scrollbar { width:0; }
        .post-card { background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:14px; border:1px solid var(--border); animation:postAppear 0.4s ease; }
        @keyframes postAppear { from{opacity:0;transform:scale(0.8) translateY(20px);} to{opacity:1;transform:scale(1) translateY(0);} }
        .post-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
        .post-avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-light)); display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; cursor:pointer; overflow:hidden; }
        .post-avatar img { width:100%; height:100%; object-fit:cover; }
        .post-username { font-weight:600; color:var(--primary-light); cursor:pointer; display:flex; align-items:center; gap:4px; }
        .post-time { font-size:0.7rem; color:var(--text-secondary); }
        .post-text { margin-bottom:12px; line-height:1.5; }
        .post-actions { display:flex; gap:20px; padding-top:8px; border-top:1px solid var(--border); }
        .post-action { display:flex; align-items:center; gap:6px; color:var(--primary-light); cursor:pointer; background:none; border:none; padding:6px 10px; border-radius:20px; font-size:0.85rem; }
        .post-action.liked { color:var(--accent); }
        .verified-badge { display:inline-block; width:16px; height:16px; background:var(--primary); border-radius:50%; font-size:0.6rem; color:white; text-align:center; line-height:16px; margin-left:2px; flex-shrink:0; }
        .like-animation { position:fixed; pointer-events:none; z-index:999; font-size:2rem; animation:likeFloat 0.8s ease-out forwards; }
        @keyframes likeFloat { 0%{opacity:1;transform:translateY(0) scale(1);} 50%{opacity:1;transform:translateY(-40px) scale(1.3);} 100%{opacity:0;transform:translateY(-80px) scale(0.8);} }
        .profile-header { display:flex; align-items:center; gap:20px; padding:20px 0; }
        .profile-avatar { width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-light)); display:flex; align-items:center; justify-content:center; font-size:2.8rem; font-weight:700; flex-shrink:0; overflow:hidden; cursor:pointer; }
        .profile-avatar img { width:100%; height:100%; object-fit:cover; }
        .profile-info { flex:1; }
        .profile-name { font-size:1.5rem; font-weight:700; display:flex; align-items:center; gap:6px; }
        .profile-username { color:var(--primary-light); }
        .profile-stats { display:flex; justify-content:space-around; margin:20px 0; }
        .stat-item { text-align:center; cursor:pointer; }
        .stat-number { font-size:1.4rem; font-weight:700; color:var(--primary-light); }
        .stat-label { font-size:0.7rem; color:var(--text-secondary); }
        .btn { padding:10px 24px; border-radius:25px; border:none; font-weight:600; cursor:pointer; font-size:0.9rem; }
        .btn-primary { background:var(--primary); color:white; }
        .btn-outline { background:transparent; border:2px solid var(--primary); color:var(--primary-light); }
        .btn:active { transform:scale(0.95); }
        .chat-screen { position:fixed; inset:0; background:var(--bg); z-index:200; display:flex; flex-direction:column; transform:translateX(100%); transition:0.3s; max-width:430px; margin:0 auto; }
        .chat-screen.open { transform:translateX(0); }
        .chat-nav { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface); }
        .back-btn { background:none; border:none; color:var(--primary-light); font-size:1.4rem; cursor:pointer; }
        .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
        .msg-bubble { max-width:80%; padding:12px 16px; border-radius:20px; font-size:0.9rem; }
        .msg-bubble.incoming { background:var(--surface2); align-self:flex-start; border-bottom-left-radius:6px; }
        .msg-bubble.outgoing { background:var(--primary); color:white; align-self:flex-end; border-bottom-right-radius:6px; }
        .chat-input-bar { display:flex; gap:8px; padding:12px 16px; padding-bottom:calc(12px + var(--safe-bottom)); background:var(--surface); }
        .chat-input { flex:1; background:var(--surface2); border:1px solid var(--border); padding:12px 18px; border-radius:25px; color:var(--text); outline:none; }
        .send-btn { width:44px; height:44px; border-radius:50%; background:var(--primary); border:none; color:white; font-size:1.2rem; cursor:pointer; }
        .bottom-nav { display:flex; background:var(--surface); border-top:1px solid var(--border); padding:8px 10px; padding-bottom:calc(8px + var(--safe-bottom)); }
        .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; background:none; border:none; color:var(--primary-light); font-size:0.7rem; }
        .nav-item .nav-icon { font-size:1.5rem; }
        .nav-item.active { color:var(--primary); }
        .fab { position:fixed; bottom:100px; right:20px; width:56px; height:56px; border-radius:50%; background:var(--primary); color:white; font-size:2rem; border:none; box-shadow:0 8px 24px rgba(37,99,235,0.6); cursor:pointer; z-index:150; animation:fabPulse 2s infinite; }
        @keyframes fabPulse { 0%,100%{box-shadow:0 8px 24px rgba(37,99,235,0.6);} 50%{box-shadow:0 8px 32px rgba(37,99,235,0.9);} }
        .fab.hidden { display:none; }
        .bank-balance-card { background:linear-gradient(135deg,#1e3a5f,#162d4a); border-radius:var(--radius); padding:24px; text-align:center; margin:16px 0; border:2px solid #3b82f6; }
        .bank-amount { font-size:3rem; font-weight:800; color:var(--gold); }
        .bank-clicker { background:radial-gradient(circle,#2563eb,#1d4ed8); border-radius:50%; width:140px; height:140px; margin:16px auto; display:flex; align-items:center; justify-content:center; flex-direction:column; border:3px solid #3b82f6; cursor:pointer; }
        .bank-clicker:active { transform:scale(0.9); }
        .float-text { position:fixed; pointer-events:none; z-index:999; font-weight:700; color:var(--gold); animation:floatUp 1s ease-out forwards; }
        @keyframes floatUp { 0%{opacity:1;transform:translateY(0);} 100%{opacity:0;transform:translateY(-60px);} }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:300; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:0.3s; }
        .modal-overlay.open { opacity:1; pointer-events:all; }
        .modal-sheet { background:var(--surface); width:100%; max-width:430px; border-radius:24px 24px 0 0; padding:20px; transform:translateY(100%); transition:0.3s; max-height:85vh; overflow-y:auto; }
        .modal-overlay.open .modal-sheet { transform:translateY(0); }
        .modal-input { width:100%; padding:14px; border-radius:20px; border:2px solid var(--border); background:var(--surface2); color:var(--text); outline:none; margin:8px 0; }
        .settings-item { display:flex; align-items:center; gap:12px; padding:16px; background:var(--surface); border-radius:14px; margin-bottom:8px; cursor:pointer; }
        .comment-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
        .welcome-overlay { position:fixed; inset:0; background:var(--bg); z-index:600; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px; }
        .welcome-title { font-size:2rem; font-weight:800; color:var(--primary-light); animation:scaleIn 0.5s ease; }
        @keyframes scaleIn { from{opacity:0;transform:scale(0.5);} to{opacity:1;transform:scale(1);} }
        .onboarding-slide { animation:slideIn 0.5s ease; }
        @keyframes slideIn { from{opacity:0;transform:translateX(30px);} to{opacity:1;transform:translateX(0);} }
        .onboarding-dots { display:flex; gap:8px; justify-content:center; margin:20px 0; }
        .onboarding-dot { width:10px; height:10px; border-radius:50%; background:var(--surface2); transition:0.3s; cursor:pointer; }
        .onboarding-dot.active { background:var(--primary); width:24px; border-radius:5px; }
        .confetti { position:fixed; pointer-events:none; z-index:1000; font-size:1.5rem; animation:confettiFall 2.5s ease-out forwards; }
        @keyframes confettiFall { 0%{opacity:1;transform:translateY(-100px) rotate(0deg);} 100%{opacity:0;transform:translateY(100vh) rotate(720deg);} }
        .search-container { position:sticky; top:0; z-index:10; padding-bottom:12px; }
        .search-input { width:100%; padding:12px 16px; border-radius:25px; border:2px solid var(--border); background:var(--surface2); color:var(--text); font-size:0.9rem; outline:none; }
        .search-input:focus { border-color:var(--primary); }
        .search-results { position:absolute; top:100%; left:0; right:0; background:var(--surface); border-radius:14px; max-height:300px; overflow-y:auto; box-shadow:0 8px 24px rgba(0,0,0,0.3); display:none; }
        .search-results.show { display:block; }
        .search-item { padding:12px 16px; cursor:pointer; display:flex; align-items:center; gap:10px; }
        .search-item:hover { background:var(--surface2); }
        .search-item-avatar { width:36px; height:36px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.8rem; flex-shrink:0; }
        .search-item-name { font-weight:600; }
        .search-item-username { color:var(--primary-light); font-size:0.8rem; }
        @media (min-width:431px) { .app,.login-screen { border-radius:30px; height:95vh; } .chat-screen { border-radius:30px; } }
    </style>
</head>
<body>
<div class="login-screen" id="loginScreen">
    <div class="login-logo">❄️ zocial</div>
    <div class="login-tabs" id="loginSwitch">
        <div class="login-tab-slider"></div>
        <button class="login-tab active" data-tab="login">вход</button>
        <button class="login-tab" data-tab="register">регистрация</button>
    </div>
    <div class="login-form" id="loginFormBlock">
        <input type="text" class="login-input" id="loginUsername" placeholder="никнейм" autocomplete="off">
        <input type="password" class="login-input" id="loginPassword" placeholder="пароль" autocomplete="off">
        <div class="login-error" id="loginError"></div>
        <button class="login-btn" id="loginSubmitBtn">войти</button>
    </div>
    <div class="login-form hidden" id="registerFormBlock">
        <input type="text" class="login-input" id="regName" placeholder="ваше имя" autocomplete="off">
        <input type="text" class="login-input" id="regUsername" placeholder="придумайте никнейм" autocomplete="off">
        <input type="password" class="login-input" id="regPassword" placeholder="пароль" autocomplete="off">
        <div class="login-error" id="regError"></div>
        <button class="login-btn" id="regSubmitBtn">зарегистрироваться</button>
    </div>
</div>

<div class="main-app" id="mainApp">
    <div class="app">
        <div class="header"><div class="logo">❄️ zocial</div><div class="header-actions"><button class="icon-btn" id="searchBtn">🔍</button></div></div>
        <div class="main-content">
            <div class="pages-container" id="pagesContainer">
                <div class="page" id="feedPage">
                    <div class="search-container" id="searchContainer" style="display:none;">
                        <input type="text" class="search-input" id="searchInput" placeholder="поиск по никнейму или имени..." autocomplete="off">
                        <div class="search-results" id="searchResults"></div>
                    </div>
                    <div id="feedPosts"></div>
                </div>
                <div class="page" id="bankPage"><div id="bankContent"></div></div>
                <div class="page" id="chatsPage"><h3 style="color:var(--primary-light);margin-bottom:16px;">💬 сообщения</h3><button class="add-contact-btn" style="width:100%;padding:14px;background:var(--surface);border:2px dashed var(--primary);border-radius:14px;color:var(--primary-light);cursor:pointer;margin-bottom:12px;" id="addContactBtn">🔍 найти пользователя</button><div id="chatListContainer"></div></div>
                <div class="page" id="profilePage"><div id="profileContent"></div></div>
                <div class="page" id="contactPage"><div id="contactContent"></div></div>
                <div class="page" id="settingsPage"><div id="settingsContent"></div></div>
            </div>
        </div>
        <button class="fab hidden" id="fabCreatePost">＋</button>
        <div class="chat-screen" id="chatScreen">
            <div class="chat-nav"><button class="back-btn" id="closeChatBtn">←</button><span id="chatScreenName" style="font-weight:600;color:var(--primary-light);">чат</span></div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-bar"><input type="text" class="chat-input" id="chatInput" placeholder="сообщение..."><button class="send-btn" id="chatSendBtn">➤</button></div>
        </div>
        <div class="bottom-nav">
            <button class="nav-item active" data-page="feed"><span class="nav-icon">🏠</span> лента</button>
            <button class="nav-item" data-page="bank"><span class="nav-icon">🏦</span> банк</button>
            <button class="nav-item" data-page="chats"><span class="nav-icon">💬</span> чаты</button>
            <button class="nav-item" data-page="profile"><span class="nav-icon">👤</span> профиль</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="createPostModal"><div class="modal-sheet"><h3 style="color:var(--primary-light);">📝 новый пост</h3><textarea class="modal-input" id="postTextInput" rows="3" placeholder="что у вас нового?"></textarea><div style="display:flex;gap:10px;margin-top:12px;"><button class="btn btn-outline" id="cancelPostBtn">отмена</button><button class="btn btn-primary" id="publishPostBtn">опубликовать</button></div></div></div>
<div class="modal-overlay" id="commentsModal"><div class="modal-sheet"><h3 style="color:var(--primary-light);">💬 комментарии</h3><div id="commentsList"></div><div style="display:flex;gap:8px;margin-top:12px;"><input class="modal-input" id="commentInput" placeholder="комментарий..." style="margin:0;flex:1;"><button class="btn btn-primary" id="commentSend">→</button></div><button class="btn btn-outline" id="closeComments" style="width:100%;margin-top:12px;">закрыть</button></div></div>
<div class="modal-overlay" id="bankTransferModal"><div class="modal-sheet" style="background:linear-gradient(135deg,#1e3a5f,#162d4a);border:2px solid #3b82f6;"><h3 style="color:var(--gold);text-align:center;">💸 перевод</h3><input class="modal-input" id="transferUsername" placeholder="никнейм" style="background:rgba(255,255,255,0.1);color:white;border-color:#3b82f6;"><input class="modal-input" type="number" id="transferAmount" placeholder="сумма" style="background:rgba(255,255,255,0.1);color:white;border-color:#3b82f6;"><div id="transferSuccess" style="text-align:center;color:var(--green);font-weight:700;margin-top:8px;display:none;">✅ успешно!</div><div style="display:flex;gap:10px;margin-top:12px;"><button class="btn btn-outline" id="cancelTransferBtn" style="color:white;border-color:white;">отмена</button><button class="btn btn-primary" id="confirmTransferBtn" style="background:var(--gold);color:#1e3a5f;">отправить</button></div></div></div>
<div class="modal-overlay" id="depositModal"><div class="modal-sheet"><h3 style="color:var(--primary-light);">🏦 вклад 2%/30с</h3><input class="modal-input" type="number" id="depositAmount" placeholder="сумма (мин. 100 🪙)"><div style="display:flex;gap:10px;margin-top:12px;"><button class="btn btn-outline" id="cancelDepositBtn">отмена</button><button class="btn btn-primary" id="confirmDepositBtn">вложить</button><button class="btn btn-outline" id="withdrawDepositBtn" style="color:var(--accent);border-color:var(--accent);">снять</button></div></div></div>
<div class="modal-overlay" id="editProfileModal"><div class="modal-sheet"><h3 style="color:var(--primary-light);">✏️ редактировать профиль</h3><div style="text-align:center;margin:12px 0;"><div class="profile-avatar" id="editAvatarPreview" style="margin:0 auto;width:80px;height:80px;font-size:2rem;"></div><input type="file" id="avatarInput" accept="image/*" style="display:none;"><button class="btn btn-outline" id="changeAvatarBtn" style="margin-top:8px;">📷 сменить аватар</button></div><input class="modal-input" id="editNameInput" placeholder="имя"><input class="modal-input" id="editBioInput" placeholder="о себе"><div style="display:flex;gap:10px;margin-top:12px;"><button class="btn btn-outline" id="cancelEditBtn">отмена</button><button class="btn btn-primary" id="saveEditBtn">сохранить</button></div></div></div>
<div class="modal-overlay" id="userListModal"><div class="modal-sheet"><h3 style="color:var(--primary-light);" id="userListTitle"></h3><div id="userListContent"></div><button class="btn btn-primary" id="closeUserListBtn" style="width:100%;margin-top:12px;">закрыть</button></div></div>

<script>
const API = window.location.origin + '/api';
const $ = id => document.getElementById(id);
async function req(method, endpoint, body = null) {
    try { const opts = { method, headers: { 'Content-Type': 'application/json' } }; if (body) opts.body = JSON.stringify(body); const res = await fetch(API + endpoint, opts); return await res.json(); }
    catch (e) { return { error: 'сервер недоступен' }; }
}

let currentUser = null, globalChats = {}, activeChatId = null, activeCommentsPostId = null, currentPage = 'feed';

function esc(t) { return String(t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[c]); }
function animateLike(x, y) { const el = document.createElement('div'); el.className = 'like-animation'; el.textContent = '❤️'; el.style.left = x + 'px'; el.style.top = y + 'px'; document.body.appendChild(el); setTimeout(() => el.remove(), 800); }
function floatCoin(x, y, amount) { const el = document.createElement('div'); el.className = 'float-text'; el.textContent = '+' + amount + ' 🪙'; el.style.left = x + 'px'; el.style.top = y + 'px'; document.body.appendChild(el); setTimeout(() => el.remove(), 1000); }
function isVerified(username) { return username === 'snzhk'; }

// Переход между страницами
function switchPage(page) {
    currentPage = page;
    const pages = ['feed', 'bank', 'chats', 'profile', 'contact', 'settings'];
    const idx = pages.indexOf(page);
    $('pagesContainer').style.transform = `translateX(-${idx * 100}%)`;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const nav = document.querySelector(`[data-page="${page}"]`);
    if (nav) nav.classList.add('active');
    $('fabCreatePost').classList.toggle('hidden', page !== 'feed');
    $('searchContainer').style.display = page === 'feed' ? 'block' : 'none';
    if (page === 'feed') loadFeed();
    else if (page === 'bank') loadBank();
    else if (page === 'chats') loadChats();
    else if (page === 'profile') loadProfile();
    else if (page === 'settings') loadSettings();
}
document.querySelectorAll('.nav-item').forEach(n => n.addEventListener('click', () => switchPage(n.dataset.page)));

function showApp() { $('loginScreen').classList.add('hidden'); $('mainApp').classList.add('visible'); switchPage('feed'); loadFeed(); loadChats(); }

function showWelcome(cb) {
    for (let i = 0; i < 40; i++) setTimeout(() => { const el = document.createElement('div'); el.className = 'confetti'; el.textContent = ['🎉','✨','❄️','🎊'][Math.floor(Math.random()*4)]; el.style.left = Math.random() * 100 + '%'; el.style.top = -(Math.random() * 100) + 'px'; document.body.appendChild(el); setTimeout(() => el.remove(), 2500); }, i * 25);
    const slides = [
        { icon: '🏠', title: 'лента', desc: 'публикуйте посты, делитесь с друзьями' },
        { icon: '💬', title: 'чаты', desc: 'общайтесь в реальном времени' },
        { icon: '🏦', title: 'zima.bank', desc: 'зарабатывайте zimcoin, делайте переводы' },
        { icon: '👤', title: 'профиль', desc: 'подписывайтесь, меняйте аватар' }
    ];
    const overlay = document.createElement('div'); overlay.className = 'welcome-overlay';
    overlay.innerHTML = `<div class="welcome-title">🎉 добро пожаловать!</div><p style="color:var(--text-secondary);">@${currentUser.username}</p><div id="onbSlide" style="margin:20px 0;"></div><div class="onboarding-dots" id="onbDots"></div><button class="btn btn-primary" id="onbNext">далее</button>`;
    document.body.appendChild(overlay);
    slides.forEach((_, i) => { const d = document.createElement('div'); d.className = 'onboarding-dot' + (i === 0 ? ' active' : ''); d.addEventListener('click', () => { idx = i; renderSlide(); }); overlay.querySelector('#onbDots').appendChild(d); });
    let idx = 0;
    function renderSlide() { const s = slides[idx]; overlay.querySelector('#onbSlide').innerHTML = `<div class="onboarding-slide"><div style="font-size:4rem;">${s.icon}</div><h3 style="color:var(--primary-light);">${s.title}</h3><p style="color:var(--text-secondary);">${s.desc}</p></div>`; overlay.querySelectorAll('.onboarding-dot').forEach((d, i) => d.classList.toggle('active', i === idx)); overlay.querySelector('#onbNext').textContent = idx === slides.length - 1 ? 'далее' : 'далее'; }
    renderSlide();
    overlay.querySelector('#onbNext').addEventListener('click', () => { if (idx < slides.length - 1) { idx++; renderSlide(); } else { overlay.remove(); showAvatarSetup(cb); } });
}

function showAvatarSetup(cb) {
    const modal = $('editProfileModal'); modal.classList.add('open');
    $('editNameInput').value = currentUser.name; $('editBioInput').value = '';
    const av = $('editAvatarPreview'); av.textContent = currentUser.name[0];
    let avatarData = null;
    $('changeAvatarBtn').onclick = () => $('avatarInput').click();
    $('avatarInput').onchange = () => { const f = $('avatarInput').files[0]; if (!f) return; const r = new FileReader(); r.onload = e => { avatarData = e.target.result; av.innerHTML = `<img src="${avatarData}" style="width:100%;height:100%;object-fit:cover;">`; }; r.readAsDataURL(f); };
    $('saveEditBtn').onclick = async () => { const name = $('editNameInput').value.trim() || currentUser.name; const bio = $('editBioInput').value.trim(); const r = await req('POST', '/profile/update', { username: currentUser.username, name, bio, avatar: avatarData }); if (!r.error) { currentUser = r.user; currentUser.username = currentUser.username; localStorage.setItem('zocial_session', JSON.stringify(currentUser)); modal.classList.remove('open'); if (cb) cb(); } };
    $('cancelEditBtn').onclick = () => { modal.classList.remove('open'); if (cb) cb(); };
}

// АВТОРИЗАЦИЯ
async function login() {
    const u = $('loginUsername').value.trim().toLowerCase(), p = $('loginPassword').value.trim();
    if (!u || !p) { $('loginError').textContent = 'заполните поля'; return; }
    const r = await req('POST', '/login', { username: u, password: p });
    if (r.error) { $('loginError').textContent = r.error; return; }
    currentUser = r.user; currentUser.username = u;
    localStorage.setItem('zocial_session', JSON.stringify(currentUser));
    showApp();
}
async function register() {
    const name = $('regName').value.trim(), username = $('regUsername').value.trim().toLowerCase(), password = $('regPassword').value.trim();
    if (!name || !username || !password) { $('regError').textContent = 'заполните все поля'; return; }
    if (username.length < 3) { $('regError').textContent = 'никнейм мин. 3 символа'; return; }
    const r = await req('POST', '/register', { name, username, password });
    if (r.error) { $('regError').textContent = r.error; return; }
    currentUser = { name, username }; localStorage.setItem('zocial_session', JSON.stringify(currentUser));
    $('loginScreen').classList.add('hidden');
    showWelcome(() => { $('mainApp').classList.add('visible'); switchPage('feed'); loadFeed(); loadChats(); });
}

// ПОИСК
$('searchBtn').addEventListener('click', () => {
    const container = $('searchContainer');
    if (container.style.display === 'none') { container.style.display = 'block'; $('searchInput').focus(); }
    else { container.style.display = 'none'; }
});
let searchTimeout;
$('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(async () => {
        const q = $('searchInput').value.trim();
        if (!q) { $('searchResults').classList.remove('show'); return; }
        const results = await req('GET', '/users/search?q=' + encodeURIComponent(q));
        $('searchResults').innerHTML = results.slice(0, 8).map(u => `
            <div class="search-item" data-u="${u.username}">
                <div class="search-item-avatar">${u.avatar ? `<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : u.name[0]}</div>
                <div><div class="search-item-name">${esc(u.name)}</div><div class="search-item-username">@${esc(u.username)}${isVerified(u.username)?' <span class="verified-badge">✓</span>':''}</div></div>
            </div>`).join('');
        $('searchResults').classList.add('show');
        $('searchResults').querySelectorAll('.search-item').forEach(el => el.addEventListener('click', () => { $('searchResults').classList.remove('show'); $('searchInput').value = ''; openContact(el.dataset.u); }));
    }, 300);
});
document.addEventListener('click', (e) => { if (!$('searchContainer').contains(e.target) && e.target !== $('searchBtn')) { $('searchResults').classList.remove('show'); } });

// ЛЕНТА
async function loadFeed() { $('feedPosts').innerHTML = '<div style="text-align:center;padding:40px;">загрузка...</div>'; const posts = await req('GET', '/posts'); $('feedPosts').innerHTML = ''; if (!posts?.length) { $('feedPosts').innerHTML = '<div style="text-align:center;padding:40px;">пока нет постов</div>'; return; } posts.forEach(post => renderPost(post, $('feedPosts'))); }
function renderPost(post, container, showDelete = false) {
    const card = document.createElement('div'); card.className = 'post-card';
    const liked = post.likedBy?.includes(currentUser?.username);
    const verified = isVerified(post.username);
    card.innerHTML = `${showDelete && post.username === currentUser.username ? `<button style="position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text-secondary);cursor:pointer;" data-pid="${post.id}">✕</button>` : ''}
        <div class="post-header"><div class="post-avatar" id="pa-${post.id}">${(post.username||'?')[0]}</div><div><div class="post-username">@${esc(post.username)}${verified ? '<span class="verified-badge">✓</span>' : ''}</div><div class="post-time">${post.time||''}</div></div></div>
        <div class="post-text">${esc(post.text||'')}</div>
        <div class="post-actions"><button class="post-action like-btn ${liked?'liked':''}" data-pid="${post.id}">${liked?'❤️':'🤍'} ${post.likes||0}</button><button class="post-action cmt-btn" data-pid="${post.id}">💬 ${(post.comments||[]).length}</button></div>`;
    card.querySelector('.post-avatar').addEventListener('click', () => openContact(post.username));
    card.querySelector('.post-username').addEventListener('click', () => openContact(post.username));
    container.appendChild(card);
    if (showDelete) card.querySelector('[data-pid]')?.addEventListener('click', async e => { e.stopPropagation(); if (confirm('удалить?')) { await req('DELETE', `/posts/${post.id}`, { username: currentUser.username }); loadFeed(); loadProfile(); } });
    card.querySelector('.like-btn').addEventListener('click', async function() { const r = await req('POST', `/posts/${post.id}/like`, { username: currentUser.username }); if (r.error) return; this.classList.toggle('liked', r.liked); this.innerHTML = `${r.liked?'❤️':'🤍'} ${r.likes}`; if (r.liked) { const rect = this.getBoundingClientRect(); animateLike(rect.left+rect.width/2-16, rect.top-20); } });
    card.querySelector('.cmt-btn').addEventListener('click', () => openComments(post.id));
}

// КОММЕНТАРИИ
async function openComments(postId) { activeCommentsPostId = postId; const posts = await req('GET', '/posts'); const post = posts.find(p => p.id === postId); if (!post) return; $('commentsList').innerHTML = post.comments?.length ? post.comments.map(c => `<div class="comment-item"><div class="post-avatar" style="width:34px;height:34px;font-size:0.8rem;">${(c.author||'?')[0]}</div><div><div class="post-username" style="font-size:0.85rem;">@${esc(c.author)}</div><div>${esc(c.text)}</div></div></div>`).join('') : '<div style="text-align:center;padding:20px;">нет комментариев</div>'; $('commentInput').value = ''; $('commentsModal').classList.add('open'); }
$('closeComments').addEventListener('click', () => $('commentsModal').classList.remove('open'));
$('commentSend').addEventListener('click', async () => { const text = $('commentInput').value.trim(); if (!text || !activeCommentsPostId) return; await req('POST', `/posts/${activeCommentsPostId}/comment`, { username: currentUser.username, text }); $('commentInput').value = ''; openComments(activeCommentsPostId); loadFeed(); });

// ПОСТЫ
$('fabCreatePost').addEventListener('click', () => { $('postTextInput').value = ''; $('createPostModal').classList.add('open'); });
$('cancelPostBtn').addEventListener('click', () => $('createPostModal').classList.remove('open'));
$('publishPostBtn').addEventListener('click', async () => { const text = $('postTextInput').value.trim(); if (!text) return; await req('POST', '/posts', { username: currentUser.username, text }); $('createPostModal').classList.remove('open'); switchPage('feed'); loadFeed(); });

// ЧАТЫ
async function loadChats() { if (!currentUser) return; const result = await req('GET', '/chat/' + currentUser.username); globalChats = result; $('chatListContainer').innerHTML = ''; const users = Object.keys(result); if (!users.length) { $('chatListContainer').innerHTML = '<div style="text-align:center;padding:40px;">нет сообщений</div>'; return; } users.forEach(u => { const msgs = result[u] || []; const div = document.createElement('div'); div.style.cssText = 'display:flex;align-items:center;gap:12px;padding:14px;background:var(--surface);border-radius:14px;margin-bottom:8px;cursor:pointer;border:1px solid var(--border);'; div.innerHTML = `<div class="post-avatar" style="width:48px;height:48px;">${u[0].toUpperCase()}</div><div><div style="font-weight:600;">@${esc(u)}${isVerified(u)?' <span class="verified-badge">✓</span>':''}</div><div style="font-size:0.8rem;color:var(--text-secondary);">${msgs.length?msgs[msgs.length-1].text:''}</div></div>`; div.addEventListener('click', () => openChat(u)); $('chatListContainer').appendChild(div); }); }
function openChat(u) { activeChatId = u; $('chatScreenName').textContent = '@' + u; renderChatMsgs(); $('chatScreen').classList.add('open'); }
function closeChat() { $('chatScreen').classList.remove('open'); activeChatId = null; loadChats(); }
function renderChatMsgs() { $('chatMessages').innerHTML = ''; if (!activeChatId || !globalChats[activeChatId]) return; globalChats[activeChatId].forEach(m => { const b = document.createElement('div'); b.className = 'msg-bubble ' + (m.from === currentUser.username ? 'outgoing' : 'incoming'); b.textContent = m.text; $('chatMessages').appendChild(b); }); }
async function sendMsg() { const text = $('chatInput').value.trim(); if (!text || !activeChatId) return; await req('POST', '/chat/send', { from: currentUser.username, to: activeChatId, text }); $('chatInput').value = ''; loadChats().then(() => { if (activeChatId) renderChatMsgs(); }); }
$('closeChatBtn').addEventListener('click', closeChat);
$('chatSendBtn').addEventListener('click', sendMsg);
$('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

// БАНК
async function loadBank() { const bank = await req('GET', '/bank/' + currentUser.username); if (bank.error) return; $('bankContent').innerHTML = `<div class="bank-balance-card"><div style="color:#93c5fd;">баланс</div><div class="bank-amount" id="bankBalance">${bank.balance.toLocaleString()} 🪙</div><div style="color:#94a3b8;">кликер: +${bank.clickLevel} | пассив: +${bank.passiveLevel}/сек${bank.depositAmount>0?` | вклад: ${bank.depositAmount} 🪙`:''}</div></div><div class="bank-clicker" id="bankClicker"><div style="font-size:3rem;">🪙</div><div>+${bank.clickLevel}</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;"><button class="btn btn-outline" id="bankUpgrade">улучшить<br><small>${(bank.clickLevel*2*50).toLocaleString()} 🪙</small></button><button class="btn btn-outline" id="bankPassive">пассивный<br><small>${((bank.passiveLevel+1)*100).toLocaleString()} 🪙</small></button><button class="btn btn-outline" id="bankDeposit">🏦 вклад</button><button class="btn btn-outline" id="bankTransfer">💸 перевод</button></div>`; $('bankClicker').addEventListener('click', async function(e) { const r = await req('POST', '/bank/click', { username: currentUser.username }); if (!r.error) { $('bankBalance').textContent = r.balance.toLocaleString() + ' 🪙'; const rect = this.getBoundingClientRect(); floatCoin(rect.left+rect.width/2-20, rect.top-20, bank.clickLevel); } }); $('bankUpgrade').addEventListener('click', async () => { const r = await req('POST', '/bank/upgrade', { username: currentUser.username }); if (!r.error) loadBank(); else alert(r.error); }); $('bankPassive').addEventListener('click', async () => { const r = await req('POST', '/bank/passive', { username: currentUser.username }); if (!r.error) loadBank(); else alert(r.error); }); $('bankDeposit').addEventListener('click', () => { $('depositAmount').value = ''; $('depositModal').classList.add('open'); }); $('bankTransfer').addEventListener('click', () => { $('transferUsername').value = ''; $('transferAmount').value = ''; $('transferSuccess').style.display = 'none'; $('bankTransferModal').classList.add('open'); }); }
$('confirmDepositBtn').addEventListener('click', async () => { const r = await req('POST', '/bank/deposit', { username: currentUser.username, amount: $('depositAmount').value }); if (r.error) alert(r.error); else { $('depositModal').classList.remove('open'); loadBank(); } });
$('withdrawDepositBtn').addEventListener('click', async () => { const r = await req('POST', '/bank/withdraw', { username: currentUser.username }); if (r.error) alert(r.error); else { $('depositModal').classList.remove('open'); loadBank(); } });
$('cancelDepositBtn').addEventListener('click', () => $('depositModal').classList.remove('open'));
$('confirmTransferBtn').addEventListener('click', async () => { const to = $('transferUsername').value.trim(), amount = parseInt($('transferAmount').value); if (!to || !amount || amount < 1) return; const r = await req('POST', '/bank/transfer', { from: currentUser.username, to, amount }); if (r.error) { alert(r.error); return; } $('transferSuccess').style.display = 'block'; setTimeout(() => { $('bankTransferModal').classList.remove('open'); loadBank(); loadChats(); }, 1200); });
$('cancelTransferBtn').addEventListener('click', () => $('bankTransferModal').classList.remove('open'));

// ПРОФИЛЬ
async function loadProfile() { const bank = await req('GET', '/bank/' + currentUser.username); const posts = await req('GET', '/posts'); const myPosts = posts.filter(p => p.username === currentUser.username); const subs = await req('GET', '/subs/' + currentUser.username); const allUsers = await req('GET', '/users'); const followers = allUsers.filter(u => subs.includes(u.username)).length; const verified = isVerified(currentUser.username); $('profileContent').innerHTML = `<div class="profile-header"><div class="profile-avatar" id="profileAvatarMain">${(currentUser.avatar?`<img src="${currentUser.avatar}">`:currentUser.name[0])}</div><div class="profile-info"><div class="profile-name">${esc(currentUser.name)}${verified?'<span class="verified-badge" style="width:20px;height:20px;font-size:0.8rem;line-height:20px;">✓</span>':''}</div><div class="profile-username">@${esc(currentUser.username)}</div></div></div><div class="profile-stats"><div class="stat-item"><div class="stat-number">${myPosts.length}</div><div class="stat-label">постов</div></div><div class="stat-item" id="statSubs"><div class="stat-number">${subs.length}</div><div class="stat-label">подписок</div></div><div class="stat-item" id="statFollowers"><div class="stat-number">${followers}</div><div class="stat-label">подписчиков</div></div><div class="stat-item"><div class="stat-number">${bank.balance.toLocaleString()}</div><div class="stat-label">🪙</div></div></div><div style="display:flex;gap:10px;margin:16px 0;"><button class="btn btn-primary" id="profileEditBtn">✏️ редактировать</button><button class="btn btn-outline" id="profileSettingsBtn">⚙️ настройки</button></div><h4 style="color:var(--primary-light);margin:16px 0;">мои посты</h4><div id="myPostsList"></div>`; const c = $('myPostsList'); if (!myPosts.length) c.innerHTML = '<div style="text-align:center;padding:20px;">нет постов</div>'; else myPosts.forEach(p => renderPost(p, c, true)); $('profileEditBtn').addEventListener('click', openEditProfile); $('profileSettingsBtn').addEventListener('click', () => switchPage('settings')); $('statSubs').addEventListener('click', () => showUserList('подписки', subs)); $('statFollowers').addEventListener('click', () => showUserList('подписчики', allUsers.filter(u => subs.includes(u.username)).map(u => u.username))); }

// КОНТАКТ
async function openContact(username) { if (username === currentUser.username) { switchPage('profile'); return; } const user = await req('GET', '/users/' + username); if (user.error) return; const subs = await req('GET', '/subs/' + currentUser.username); const isSub = subs.includes(username); const verified = isVerified(username); switchPage('contact'); $('contactContent').innerHTML = `<div class="profile-header"><div class="profile-avatar">${user.avatar?`<img src="${user.avatar}">`:user.name[0]}</div><div class="profile-info"><div class="profile-name">${esc(user.name)}${verified?'<span class="verified-badge" style="width:20px;height:20px;font-size:0.8rem;line-height:20px;">✓</span>':''}</div><div class="profile-username">@${esc(username)}</div></div></div><div style="display:flex;gap:10px;margin:16px 0;"><button class="btn btn-primary" id="contactChatBtn">💬 написать</button><button class="btn btn-outline" id="contactSubBtn">${isSub?'✅ подписан':'➕ подписаться'}</button><button class="btn btn-outline" id="contactBackBtn">← назад</button></div>`; $('contactChatBtn').addEventListener('click', () => openChat(username)); $('contactSubBtn').addEventListener('click', async () => { const r = await req('POST', '/subs/toggle', { subscriber: currentUser.username, target: username }); $('contactSubBtn').textContent = r.subscribed ? '✅ подписан' : '➕ подписаться'; }); $('contactBackBtn').addEventListener('click', () => switchPage('feed')); }

// РЕДАКТИРОВАНИЕ ПРОФИЛЯ
function openEditProfile() { $('editNameInput').value = currentUser.name; $('editBioInput').value = currentUser.bio || ''; const av = $('editAvatarPreview'); if (currentUser.avatar) av.innerHTML = `<img src="${currentUser.avatar}" style="width:100%;height:100%;object-fit:cover;">`; else av.textContent = currentUser.name[0]; let avatarData = null; $('changeAvatarBtn').onclick = () => $('avatarInput').click(); $('avatarInput').onchange = () => { const f = $('avatarInput').files[0]; if (!f) return; const r = new FileReader(); r.onload = e => { avatarData = e.target.result; av.innerHTML = `<img src="${avatarData}" style="width:100%;height:100%;object-fit:cover;">`; }; r.readAsDataURL(f); }; $('saveEditBtn').onclick = async () => { const name = $('editNameInput').value.trim() || currentUser.name; const bio = $('editBioInput').value.trim(); const r = await req('POST', '/profile/update', { username: currentUser.username, name, bio, avatar: avatarData }); if (!r.error) { currentUser = r.user; currentUser.username = currentUser.username; localStorage.setItem('zocial_session', JSON.stringify(currentUser)); $('editProfileModal').classList.remove('open'); switchPage('profile'); loadProfile(); } }; $('cancelEditBtn').onclick = () => $('editProfileModal').classList.remove('open'); $('editProfileModal').classList.add('open'); }

// СПИСОК
async function showUserList(title, users) { $('userListTitle').textContent = title; $('userListContent').innerHTML = users.map(u => `<div class="settings-item" style="cursor:pointer;" data-u="${u}">@${esc(u)}${isVerified(u)?' <span class="verified-badge">✓</span>':''}</div>`).join(''); $('userListContent').querySelectorAll('.settings-item').forEach(el => el.addEventListener('click', () => { $('userListModal').classList.remove('open'); openContact(el.dataset.u); })); $('userListModal').classList.add('open'); }
$('closeUserListBtn').addEventListener('click', () => $('userListModal').classList.remove('open'));

// НАСТРОЙКИ
function loadSettings() { $('settingsContent').innerHTML = `<h3 style="color:var(--primary-light);margin-bottom:24px;">⚙️ настройки</h3><div class="settings-item" id="setTheme"><span>🎨</span><span style="flex:1;">тема</span><span>${document.body.classList.contains('theme-light')?'светлая':'тёмная'}</span></div><div class="settings-item" id="setLogout"><span>🚪</span><span style="color:var(--accent);">выйти</span></div>`; $('setTheme').addEventListener('click', () => { document.body.classList.toggle('theme-light'); localStorage.setItem('zc_theme', document.body.classList.contains('theme-light')?'light':'dark'); loadSettings(); }); $('setLogout').addEventListener('click', () => { localStorage.removeItem('zocial_session'); location.reload(); }); }

// ПЕРЕКЛЮЧАТЕЛЬ ВХОДА
document.querySelectorAll('.login-tab').forEach(tab => tab.addEventListener('click', function() { document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active')); this.classList.add('active'); document.querySelector('.login-tab-slider').classList.toggle('right', this.dataset.tab === 'register'); $('loginFormBlock').classList.toggle('hidden', this.dataset.tab === 'register'); $('registerFormBlock').classList.toggle('hidden', this.dataset.tab === 'login'); }));
$('loginSubmitBtn').addEventListener('click', login);
$('regSubmitBtn').addEventListener('click', register);
$('addContactBtn').addEventListener('click', () => { $('searchContainer').style.display = 'block'; $('searchInput').focus(); });

// АВТОВХОД
(async () => { if (localStorage.getItem('zc_theme') === 'light') document.body.classList.add('theme-light'); const session = localStorage.getItem('zocial_session'); if (session) { try { const saved = JSON.parse(session); const r = await req('POST', '/login', { username: saved.username, password: '' }); if (r.error) throw new Error('no session'); currentUser = r.user; currentUser.username = saved.username; showApp(); } catch (e) { localStorage.removeItem('zocial_session'); $('loginScreen').classList.remove('hidden'); } } else { $('loginScreen').classList.remove('hidden'); } })();
</script>
