<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>❄️ Zocial — социальная сеть</title>
    <style>
        :root {
            --primary: #2563eb; --primary-light: #60a5fa; --primary-dark: #1d4ed8;
            --accent: #f97316; --bg: #0a0a1a; --surface: #1a1a2e; --surface2: #16213e;
            --text: #ffffff; --text-secondary: #94a3b8;
            --border: rgba(37, 99, 235, 0.15); --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 20px; --radius-sm: 14px; --safe-bottom: env(safe-area-inset-bottom, 16px);
            --gold: #f59e0b; --green: #10b981;
        }
        .theme-light {
            --bg: #f1f5f9; --surface: #ffffff; --surface2: #e2e8f0; --text: #1e293b;
            --text-secondary: #64748b; --border: rgba(37, 99, 235, 0.2); --shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;
            transition: background 0.5s, color 0.5s;
        }
        .app { width:100%; max-width:430px; height:100vh; height:100dvh; display:flex; flex-direction:column; background:var(--bg); position:relative; overflow:hidden; }
        
        .login-screen { position:fixed; inset:0; background:var(--bg); z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; max-width:430px; margin:0 auto; }
        .login-screen.hidden { display:none; }
        .login-logo { font-size:3rem; font-weight:800; color:var(--primary-light); margin-bottom:24px; }
        .login-tabs { display:flex; width:100%; background:var(--surface2); border-radius:25px; padding:4px; margin-bottom:20px; position:relative; }
        .login-tab-slider { position:absolute; top:4px; left:4px; height:calc(100% - 8px); width:calc(50% - 4px); background:var(--primary); border-radius:22px; transition:transform 0.35s; z-index:1; }
        .login-tab-slider.right { transform:translateX(100%); }
        .login-tab { flex:1; padding:12px; text-align:center; border-radius:22px; cursor:pointer; font-weight:600; color:var(--text-secondary); border:none; background:transparent; font-size:0.95rem; z-index:2; transition:color 0.3s; }
        .login-tab.active { color:white; }
        .login-form { width:100%; display:flex; flex-direction:column; gap:14px; }
        .login-form.hidden { display:none; }
        .login-input { width:100%; padding:16px 20px; border-radius:25px; border:2px solid var(--border); background:var(--surface); color:var(--text); font-size:1rem; outline:none; }
        .login-input:focus { border-color:var(--primary); }
        .login-error { color:var(--accent); font-size:0.85rem; text-align:center; min-height:20px; }
        .login-btn { width:100%; padding:16px; border-radius:25px; border:none; background:var(--primary); color:white; font-size:1.1rem; font-weight:700; cursor:pointer; }
        
        .main-app { display:none; width:100%; height:100%; flex-direction:column; }
        .main-app.visible { display:flex; }
        .header { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; background:var(--surface); border-bottom:1px solid var(--border); z-index:100; }
        .logo { font-size:1.6rem; font-weight:800; color:var(--primary-light); }
        .icon-btn { width:38px; height:38px; border-radius:50%; background:var(--surface2); border:1px solid var(--border); color:var(--primary-light); font-size:1.2rem; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        
        .main-content { flex:1; overflow-y:auto; position:relative; }
        .main-content::-webkit-scrollbar { width:0; }
        .section { display:none; padding:16px; animation:fadeIn 0.3s; }
        .section.active { display:block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
        
        .post-card { background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:14px; border:1px solid var(--border); animation:postAppear 0.4s ease; }
        @keyframes postAppear { from{opacity:0;transform:scale(0.8) translateY(20px);} to{opacity:1;transform:scale(1) translateY(0);} }
        .post-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
        .post-avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--primary-dark),var(--primary-light)); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1rem; flex-shrink:0; overflow:hidden; cursor:pointer; }
        .post-avatar img { width:100%; height:100%; object-fit:cover; }
        .post-user-info { flex:1; cursor:pointer; }
        .post-username { font-weight:600; font-size:0.95rem; color:var(--primary-light); }
        .post-time { font-size:0.7rem; color:var(--text-secondary); }
        .post-text { font-size:0.9rem; line-height:1.5; margin-bottom:12px; }
        .post-actions { display:flex; gap:20px; padding-top:8px; border-top:1px solid var(--border); }
        .post-action { display:flex; align-items:center; gap:6px; font-size:0.85rem; color:var(--primary-light); cursor:pointer; background:none; border:none; padding:6px 10px; border-radius:20px; }
        .post-action.liked { color:var(--accent); }
        
        .like-animation { position:fixed; pointer-events:none; z-index:999; font-size:2rem; animation:likeFloat 0.8s ease-out forwards; }
        @keyframes likeFloat { 0%{opacity:1;transform:translateY(0) scale(1);} 50%{opacity:1;transform:translateY(-40px) scale(1.3);} 100%{opacity:0;transform:translateY(-80px) scale(0.8);} }
        
        .profile-header { display:flex; align-items:center; gap:20px; padding:20px 0; }
        .profile-avatar { width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg,var(--primary-dark),var(--primary-light)); display:flex; align-items:center; justify-content:center; font-size:2.8rem; font-weight:700; flex-shrink:0; overflow:hidden; box-shadow:0 8px 25px rgba(37,99,235,0.4); }
        .profile-info { flex:1; }
        .profile-name { font-size:1.5rem; font-weight:700; }
        .profile-username { color:var(--primary-light); font-size:0.95rem; }
        .profile-stats { display:flex; justify-content:space-around; margin:20px 0; }
        .stat-item { text-align:center; }
        .stat-number { font-size:1.4rem; font-weight:700; color:var(--primary-light); }
        .stat-label { font-size:0.7rem; color:var(--text-secondary); }
        .btn { padding:10px 24px; border-radius:25px; border:none; font-weight:600; cursor:pointer; font-size:0.9rem; transition:0.2s; }
        .btn-primary { background:var(--primary); color:white; }
        .btn-outline { background:transparent; border:2px solid var(--primary); color:var(--primary-light); }
        .btn:active { transform:scale(0.95); }
        .profile-tabs { display:flex; gap:8px; margin-bottom:16px; }
        .profile-tab { padding:8px 16px; border-radius:20px; background:var(--surface2); color:var(--text-secondary); border:none; cursor:pointer; font-size:0.8rem; font-weight:600; }
        .profile-tab.active { background:var(--primary); color:white; }
        
        .chat-list-item { display:flex; align-items:center; gap:12px; padding:14px; background:var(--surface); border-radius:var(--radius-sm); margin-bottom:8px; cursor:pointer; border:1px solid var(--border); }
        .chat-avatar-sm { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,var(--primary-dark),var(--primary-light)); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1.1rem; flex-shrink:0; overflow:hidden; }
        .chat-list-name { font-weight:600; }
        .chat-list-preview { font-size:0.8rem; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .add-contact-btn { width:100%; padding:14px; background:var(--surface); border:2px dashed var(--primary); border-radius:var(--radius-sm); color:var(--primary-light); font-size:0.9rem; cursor:pointer; margin-bottom:12px; }
        
        .chat-screen { position:fixed; inset:0; background:var(--bg); z-index:200; display:flex; flex-direction:column; transform:translateX(100%); transition:transform 0.3s; max-width:430px; margin:0 auto; }
        .chat-screen.open { transform:translateX(0); }
        .chat-nav { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--border); }
        .back-btn { background:none; border:none; color:var(--primary-light); font-size:1.4rem; cursor:pointer; }
        .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
        .msg-bubble { max-width:80%; padding:12px 16px; border-radius:20px; font-size:0.9rem; word-break:break-word; }
        .msg-bubble.incoming { background:var(--surface2); align-self:flex-start; border-bottom-left-radius:6px; }
        .msg-bubble.outgoing { background:var(--primary); color:white; align-self:flex-end; border-bottom-right-radius:6px; }
        .chat-input-bar { display:flex; gap:8px; padding:12px 16px; padding-bottom:calc(12px + var(--safe-bottom)); background:var(--surface); }
        .chat-input { flex:1; background:var(--surface2); border:1px solid var(--border); padding:12px 18px; border-radius:25px; color:var(--text); font-size:0.9rem; outline:none; }
        .send-btn { width:44px; height:44px; border-radius:50%; background:var(--primary); border:none; color:white; font-size:1.2rem; cursor:pointer; }
        
        .bottom-nav { display:flex; background:var(--surface); border-top:1px solid var(--border); padding:8px 10px; padding-bottom:calc(8px + var(--safe-bottom)); }
        .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 4px; border-radius:16px; cursor:pointer; background:none; border:none; color:var(--primary-light); font-size:0.7rem; font-weight:500; position:relative; }
        .nav-item .nav-icon { font-size:1.5rem; }
        .nav-item.active { color:var(--primary); background:var(--surface2); }
        
        .fab { position:fixed; bottom:100px; right:20px; width:56px; height:56px; border-radius:50%; background:var(--primary); color:white; font-size:2rem; border:none; box-shadow:0 8px 24px rgba(37,99,235,0.6); cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:150; animation:fabPulse 2s infinite; }
        @keyframes fabPulse { 0%,100%{box-shadow:0 8px 24px rgba(37,99,235,0.6);} 50%{box-shadow:0 8px 32px rgba(37,99,235,0.9);} }
        .fab.hidden { display:none; }
        
        .bank-balance-card { background:linear-gradient(135deg,#1e3a5f,#162d4a); border-radius:var(--radius); padding:24px; text-align:center; margin:16px 0; border:2px solid #3b82f6; }
        .bank-balance-amount { font-size:3rem; font-weight:800; color:var(--gold); margin:8px 0; }
        .bank-clicker-area { background:radial-gradient(circle,#2563eb,#1d4ed8); border-radius:50%; width:140px; height:140px; margin:16px auto; display:flex; align-items:center; justify-content:center; flex-direction:column; border:3px solid #3b82f6; cursor:pointer; }
        .bank-clicker-area:active { transform:scale(0.9); }
        .bank-clicker-coin { font-size:3rem; }
        
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:300; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s; }
        .modal-overlay.open { opacity:1; pointer-events:all; }
        .modal-sheet { background:var(--surface); width:100%; max-width:430px; border-radius:24px 24px 0 0; padding:20px; padding-bottom:calc(20px + var(--safe-bottom)); transform:translateY(100%); transition:transform 0.3s; max-height:85vh; overflow-y:auto; }
        .modal-overlay.open .modal-sheet { transform:translateY(0); }
        .modal-input { width:100%; padding:14px 18px; border-radius:20px; border:2px solid var(--border); background:var(--surface2); color:var(--text); font-size:0.95rem; outline:none; margin:8px 0; }
        .modal-input:focus { border-color:var(--primary); }
        
        .settings-item { display:flex; align-items:center; gap:12px; padding:16px; background:var(--surface); border-radius:var(--radius-sm); margin-bottom:8px; cursor:pointer; }
        
        .comment-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
        .comment-avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--primary-dark),var(--primary-light)); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.8rem; flex-shrink:0; cursor:pointer; overflow:hidden; }
        .comment-author { font-weight:600; color:var(--primary-light); cursor:pointer; font-size:0.85rem; }
        
        .welcome-overlay { position:fixed; inset:0; background:var(--bg); z-index:600; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px; max-width:430px; margin:0 auto; }
        .welcome-title { font-size:2rem; font-weight:800; color:var(--primary-light); margin-bottom:8px; animation:scaleIn 0.5s ease; }
        @keyframes scaleIn { from{opacity:0;transform:scale(0.5);} to{opacity:1;transform:scale(1);} }
        .onboarding-slide { animation:slideIn 0.5s ease; }
        @keyframes slideIn { from{opacity:0;transform:translateX(30px);} to{opacity:1;transform:translateX(0);} }
        .onboarding-dots { display:flex; gap:8px; justify-content:center; margin:20px 0; }
        .onboarding-dot { width:10px; height:10px; border-radius:50%; background:var(--surface2); transition:0.3s; cursor:pointer; }
        .onboarding-dot.active { background:var(--primary); width:24px; border-radius:5px; }
        .confetti { position:fixed; pointer-events:none; z-index:1000; font-size:1.5rem; animation:confettiFall 2.5s ease-out forwards; }
        @keyframes confettiFall { 0%{opacity:1;transform:translateY(-100px) rotate(0deg);} 100%{opacity:0;transform:translateY(100vh) rotate(720deg);} }
        
        .video-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .video-card { background:var(--surface); border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--border); cursor:pointer; }
        .video-thumb { width:100%; aspect-ratio:16/10; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:2rem; }
        .video-info { padding:8px; }
        
        @media (min-width:431px) { .app,.login-screen { border-radius:30px; height:95vh; box-shadow:0 20px 60px rgba(0,0,0,0.6); } .chat-screen { border-radius:30px; } }
    </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <div class="login-logo">❄️ zocial</div>
    <div class="login-tabs" id="loginSwitch">
        <div class="login-tab-slider"></div>
        <button class="login-tab active" data-tab="login">вход</button>
        <button class="login-tab" data-tab="register">регистрация</button>
    </div>
    <div class="login-form" id="loginFormBlock">
        <input type="text" class="login-input" id="loginUsername" placeholder="никнейм" autocomplete="off">
        <input type="password" class="login-input" id="loginPassword" placeholder="пароль" autocomplete="off">
        <div class="login-error" id="loginError"></div>
        <button class="login-btn" id="loginSubmitBtn">войти</button>
    </div>
    <div class="login-form hidden" id="registerFormBlock">
        <input type="text" class="login-input" id="regName" placeholder="ваше имя" autocomplete="off">
        <input type="text" class="login-input" id="regUsername" placeholder="придумайте никнейм" autocomplete="off">
        <input type="password" class="login-input" id="regPassword" placeholder="пароль" autocomplete="off">
        <div class="login-error" id="regError"></div>
        <button class="login-btn" id="regSubmitBtn">зарегистрироваться</button>
    </div>
</div>

<div class="main-app" id="mainApp">
    <div class="app">
        <div class="header"><div class="logo">❄️ zocial</div><div class="header-actions"><button class="icon-btn" id="searchBtn">🔍</button></div></div>
        <div class="main-content" id="mainContent">
            <div class="section active" id="feedSection"><div id="feedPosts"></div></div>
            <div class="section" id="videoSection"><h3 style="color:var(--primary-light);">🎬 видео</h3><div class="video-grid" id="videoGrid"></div></div>
            <div class="section" id="bankSection"><div id="bankContent"></div></div>
            <div class="section" id="messagesSection"><h3 style="color:var(--primary-light);">💬 сообщения</h3><button class="add-contact-btn" id="addContactBtn">🔍 найти пользователя</button><div id="chatListContainer"></div></div>
            <div class="section" id="profileSection"><div id="profileContent"></div></div>
            <div class="section" id="contactProfileSection"><div id="contactProfileContent"></div></div>
            <div class="section" id="settingsSection"><div id="settingsContent"></div></div>
        </div>
        <button class="fab hidden" id="fabCreatePost">＋</button>

        <div class="chat-screen" id="chatScreen">
            <div class="chat-nav"><button class="back-btn" id="closeChatBtn">←</button><span id="chatScreenName" style="font-weight:600;color:var(--primary-light);">чат</span></div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-bar"><input type="text" class="chat-input" id="chatInput" placeholder="сообщение..."><button class="send-btn" id="chatSendBtn">➤</button></div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item active" data-section="feedSection"><span class="nav-icon">🏠</span> лента</button>
            <button class="nav-item" data-section="videoSection"><span class="nav-icon">🎬</span> видео</button>
            <button class="nav-item" data-section="bankSection"><span class="nav-icon">🏦</span> банк</button>
            <button class="nav-item" data-section="messagesSection"><span class="nav-icon">💬</span> чаты</button>
            <button class="nav-item" data-section="profileSection"><span class="nav-icon">👤</span> профиль</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="createPostModal"><div class="modal-sheet"><h3 style="color:var(--primary-light);">📝 новый пост</h3><textarea class="modal-input" id="postTextInput" rows="3" placeholder="что у вас нового?"></textarea><div style="display:flex;gap:10px;margin-top:12px;"><button class="btn btn-outline" id="cancelPostBtn">отмена</button><button class="btn btn-primary" id="publishPostBtn">опубликовать</button></div></div></div>
<div class="modal-overlay" id="editProfileModal"><div class="modal-sheet"><h3 style="color:var(--primary-light);">✏️ редактировать</h3><div class="profile-avatar" id="editAvatarPreview" style="margin:0 auto;width:80px;height:80px;font-size:2rem;"></div><input class="modal-input" id="editNameInput" placeholder="имя"><input class="modal-input" id="editBioInput" placeholder="о себе"><div style="display:flex;gap:10px;margin-top:12px;"><button class="btn btn-outline" id="cancelEditProfileBtn">отмена</button><button class="btn btn-primary" id="saveProfileBtn">сохранить</button></div></div></div>
<div class="modal-overlay" id="commentsModal"><div class="modal-sheet"><h3 style="color:var(--primary-light);">💬 комментарии</h3><div id="commentsList"></div><div style="display:flex;gap:8px;margin-top:12px;"><input class="modal-input" id="commentInput" placeholder="комментарий..." style="margin:0;flex:1;"><button class="btn btn-primary" id="commentSend">→</button></div><button class="btn btn-outline" id="closeComments" style="width:100%;margin-top:12px;">закрыть</button></div></div>

<div id="loadingScreen" style="position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;font-size:3rem;">❄️</div>

<script>
// ============ КОНФИГУРАЦИЯ ============
const API = window.location.origin + '/api';

const $ = id => document.getElementById(id);

async function api(method, endpoint, body = null) {
    try {
        const opts = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(API + endpoint, opts);
        return await res.json();
    } catch (e) {
        return { error: 'сервер недоступен' };
    }
}

let currentUser = null;
let globalChats = {};
let activeChatId = null;
let activeCommentsPostId = null;

function esc(t) { return String(t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[c]); }
function animateLike(x, y) {
    const el = document.createElement('div');
    el.className = 'like-animation';
    el.textContent = '❤️';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
}

// ============ ОНБОРДИНГ ============
function showWelcome(callback) {
    for (let i = 0; i < 50; i++) {
        setTimeout(() => {
            const el = document.createElement('div');
            el.className = 'confetti';
            el.textContent = ['🎉','✨','❄️','🎊','🌟'][Math.floor(Math.random()*5)];
            el.style.left = Math.random() * 100 + '%';
            el.style.top = -(Math.random() * 100) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2500);
        }, i * 25);
    }

    const slides = [
        { icon: '🏠', title: 'лента', desc: 'публикуйте посты, делитесь с друзьями' },
        { icon: '💬', title: 'чаты', desc: 'общайтесь в реальном времени' },
        { icon: '🏦', title: 'zima.bank', desc: 'зарабатывайте zimcoin' },
        { icon: '👤', title: 'профиль', desc: 'настраивайте страницу, подписывайтесь' }
    ];

    const overlay = document.createElement('div');
    overlay.className = 'welcome-overlay';
    overlay.innerHTML = `
        <div class="welcome-title">🎉 добро пожаловать!</div>
        <p style="color:var(--text-secondary);">@${currentUser.username}</p>
        <div id="onbSlide" style="margin:20px 0;"></div>
        <div class="onboarding-dots" id="onbDots"></div>
        <button class="btn btn-primary" id="onbNext">далее</button>
    `;
    document.body.appendChild(overlay);

    slides.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'onboarding-dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => { idx = i; renderSlide(); });
        overlay.querySelector('#onbDots').appendChild(dot);
    });

    let idx = 0;
    function renderSlide() {
        const s = slides[idx];
        overlay.querySelector('#onbSlide').innerHTML = `
            <div class="onboarding-slide">
                <div style="font-size:4rem;">${s.icon}</div>
                <h3 style="color:var(--primary-light);">${s.title}</h3>
                <p style="color:var(--text-secondary);">${s.desc}</p>
            </div>`;
        overlay.querySelectorAll('.onboarding-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
        overlay.querySelector('#onbNext').textContent = idx === slides.length - 1 ? 'всё понятно!' : 'далее';
    }
    renderSlide();

    overlay.querySelector('#onbNext').addEventListener('click', () => {
        if (idx < slides.length - 1) { idx++; renderSlide(); }
        else { overlay.remove(); if (callback) callback(); }
    });
}

// ============ АВТОРИЗАЦИЯ ============
async function login() {
    const username = $('loginUsername').value.trim().toLowerCase();
    const password = $('loginPassword').value.trim();
    if (!username || !password) { $('loginError').textContent = 'заполните поля'; return; }

    const result = await api('POST', '/login', { username, password });
    if (result.error) { $('loginError').textContent = result.error; return; }

    currentUser = result.user;
    currentUser.username = username;
    localStorage.setItem('zocial_session', JSON.stringify(currentUser));
    showApp();
}

async function register() {
    const name = $('regName').value.trim();
    const username = $('regUsername').value.trim().toLowerCase();
    const password = $('regPassword').value.trim();
    if (!name || !username || !password) { $('regError').textContent = 'заполните все поля'; return; }
    if (username.length < 3) { $('regError').textContent = 'никнейм мин. 3 символа'; return; }

    const result = await api('POST', '/register', { name, username, password });
    if (result.error) { $('regError').textContent = result.error; return; }

    currentUser = { name, username };
    localStorage.setItem('zocial_session', JSON.stringify(currentUser));
    $('loginScreen').classList.add('hidden');
    showWelcome(() => {
        $('mainApp').classList.add('visible');
        switchSection('feedSection');
        loadFeed();
        loadChats();
    });
}

function showApp() {
    $('loginScreen').classList.add('hidden');
    $('mainApp').classList.add('visible');
    switchSection('feedSection');
    loadFeed();
    loadChats();
}

// ============ НАВИГАЦИЯ ============
function switchSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    const sec = document.getElementById(id);
    if (sec) sec.classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const nav = document.querySelector(`[data-section="${id}"]`);
    if (nav) nav.classList.add('active');
    $('mainContent').scrollTop = 0;
    $('fabCreatePost').classList.toggle('hidden', !['feedSection','videoSection'].includes(id));
}

document.querySelectorAll('.nav-item').forEach(n => n.addEventListener('click', () => switchSection(n.dataset.section)));

// ============ ЛЕНТА ============
async function loadFeed() {
    $('feedPosts').innerHTML = '<div style="text-align:center;padding:40px;">загрузка...</div>';
    const posts = await api('GET', '/posts');
    $('feedPosts').innerHTML = '';
    if (!posts?.length) {
        $('feedPosts').innerHTML = '<div style="text-align:center;padding:40px;">пока нет постов</div>';
        return;
    }
    posts.forEach(post => renderPost(post, $('feedPosts')));
}

function renderPost(post, container) {
    const card = document.createElement('div');
    card.className = 'post-card';
    const liked = post.likedBy?.includes(currentUser?.username);

    card.innerHTML = `
        <div class="post-header">
            <div class="post-avatar">${(post.username || '?')[0].toUpperCase()}</div>
            <div class="post-user-info">
                <div class="post-username">@${esc(post.username)}</div>
                <div class="post-time">${post.time || ''}</div>
            </div>
        </div>
        <div class="post-text">${esc(post.text || '')}</div>
        <div class="post-actions">
            <button class="post-action like-btn ${liked ? 'liked' : ''}" data-pid="${post.id}">${liked ? '❤️' : '🤍'} ${post.likes || 0}</button>
            <button class="post-action cmt-btn" data-pid="${post.id}">💬 ${(post.comments || []).length}</button>
        </div>`;

    card.querySelector('.like-btn').addEventListener('click', async function() {
        const result = await api('POST', `/posts/${post.id}/like`, { username: currentUser.username });
        if (result.error) return;
        this.classList.toggle('liked', result.liked);
        this.innerHTML = `${result.liked ? '❤️' : '🤍'} ${result.likes}`;
        if (result.liked) {
            const rect = this.getBoundingClientRect();
            animateLike(rect.left + rect.width/2 - 16, rect.top - 20);
        }
    });

    card.querySelector('.cmt-btn').addEventListener('click', () => openComments(post.id));

    container.appendChild(card);
}

// ============ КОММЕНТАРИИ ============
async function openComments(postId) {
    activeCommentsPostId = postId;
    const posts = await api('GET', '/posts');
    const post = posts.find(p => p.id === postId);
    if (!post) return;

    $('commentsList').innerHTML = '';
    if (!post.comments?.length) {
        $('commentsList').innerHTML = '<div style="text-align:center;padding:20px;">нет комментариев</div>';
    } else {
        post.comments.forEach(c => {
            const d = document.createElement('div');
            d.className = 'comment-item';
            d.innerHTML = `<div class="comment-avatar">${(c.author || '?')[0]}</div><div><div class="comment-author">@${esc(c.author)}</div><div>${esc(c.text)}</div></div>`;
            $('commentsList').appendChild(d);
        });
    }
    $('commentInput').value = '';
    $('commentsModal').classList.add('open');
}

$('closeComments').addEventListener('click', () => $('commentsModal').classList.remove('open'));
$('commentSend').addEventListener('click', async () => {
    const text = $('commentInput').value.trim();
    if (!text || !activeCommentsPostId) return;
    await api('POST', `/posts/${activeCommentsPostId}/comment`, { username: currentUser.username, text });
    $('commentInput').value = '';
    openComments(activeCommentsPostId);
    loadFeed();
});

// ============ ПОСТЫ ============
$('fabCreatePost').addEventListener('click', () => { $('postTextInput').value = ''; $('createPostModal').classList.add('open'); });
$('cancelPostBtn').addEventListener('click', () => $('createPostModal').classList.remove('open'));
$('publishPostBtn').addEventListener('click', async () => {
    const text = $('postTextInput').value.trim();
    if (!text) return;
    await api('POST', '/posts', { username: currentUser.username, text });
    $('createPostModal').classList.remove('open');
    switchSection('feedSection');
    loadFeed();
});

// ============ ЧАТЫ ============
async function loadChats() {
    if (!currentUser) return;
    const result = await api('GET', '/chat/' + currentUser.username);
    globalChats = result;
    $('chatListContainer').innerHTML = '';
    const users = Object.keys(result);
    if (!users.length) {
        $('chatListContainer').innerHTML = '<div style="text-align:center;padding:40px;">нет сообщений</div>';
        return;
    }
    users.forEach(u => {
        const msgs = result[u] || [];
        const div = document.createElement('div');
        div.className = 'chat-list-item';
        div.innerHTML = `<div class="chat-avatar-sm">${u[0].toUpperCase()}</div><div><div class="chat-list-name">@${esc(u)}</div><div class="chat-list-preview">${msgs.length ? msgs[msgs.length-1].text : ''}</div></div>`;
        div.addEventListener('click', () => openChat(u));
        $('chatListContainer').appendChild(div);
    });
}

function openChat(username) {
    activeChatId = username;
    $('chatScreenName').textContent = '@' + username;
    renderChatMessages();
    $('chatScreen').classList.add('open');
    setTimeout(() => $('chatInput').focus(), 300);
}

function closeChat() { $('chatScreen').classList.remove('open'); activeChatId = null; loadChats(); }

function renderChatMessages() {
    $('chatMessages').innerHTML = '';
    if (!activeChatId || !globalChats[activeChatId]) return;
    (globalChats[activeChatId] || []).forEach(m => {
        const b = document.createElement('div');
        b.className = `msg-bubble ${m.from === currentUser.username ? 'outgoing' : 'incoming'}`;
        b.textContent = m.text;
        $('chatMessages').appendChild(b);
    });
    $('chatMessages').scrollTop = $('chatMessages').scrollHeight;
}

async function sendMessage() {
    const text = $('chatInput').value.trim();
    if (!text || !activeChatId) return;
    await api('POST', '/chat/send', { from: currentUser.username, to: activeChatId, text });
    $('chatInput').value = '';
    const updated = await api('GET', '/chat/' + currentUser.username);
    globalChats = updated;
    renderChatMessages();
    loadChats();
}

$('closeChatBtn').addEventListener('click', closeChat);
$('chatSendBtn').addEventListener('click', sendMessage);
$('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

// ============ БАНК ============
async function loadBank() {
    const bank = await api('GET', '/bank/' + currentUser.username);
    if (bank.error) return;
    $('bankContent').innerHTML = `
        <div class="bank-balance-card">
            <div style="color:#93c5fd;">баланс</div>
            <div class="bank-balance-amount" id="bankBalance">${bank.balance.toLocaleString()} 🪙</div>
            <div style="color:#94a3b8;">кликер: +${bank.clickLevel}</div>
        </div>
        <div class="bank-clicker-area" id="bankClicker"><div class="bank-clicker-coin">🪙</div><div>+${bank.clickLevel}</div></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;">
            <button class="btn btn-outline" id="bankUpgrade" style="text-align:center;">улучшить<br><small>${(bank.clickLevel * 100).toLocaleString()} 🪙</small></button>
        </div>`;

    $('bankClicker').addEventListener('click', async () => {
        const r = await api('POST', '/bank/click', { username: currentUser.username });
        if (!r.error) $('bankBalance').textContent = r.balance.toLocaleString() + ' 🪙';
    });

    $('bankUpgrade').addEventListener('click', async () => {
        const r = await api('POST', '/bank/upgrade', { username: currentUser.username });
        if (!r.error) loadBank();
        else alert(r.error);
    });
}

// ============ ПРОФИЛЬ ============
async function loadProfile() {
    const bank = await api('GET', '/bank/' + currentUser.username);
    $('profileContent').innerHTML = `
        <div class="profile-header">
            <div class="profile-avatar">${currentUser.name[0].toUpperCase()}</div>
            <div class="profile-info">
                <div class="profile-name">${esc(currentUser.name)}</div>
                <div class="profile-username">@${esc(currentUser.username)}</div>
            </div>
        </div>
        <div class="profile-stats">
            <div class="stat-item"><div class="stat-number">${bank.balance.toLocaleString()}</div><div class="stat-label">🪙</div></div>
        </div>
        <div class="profile-actions">
            <button class="btn btn-primary" id="profileEditBtn">✏️ редактировать</button>
            <button class="btn btn-outline" id="profileSettingsBtn">⚙️ настройки</button>
        </div>`;

    $('profileEditBtn').addEventListener('click', () => {
        $('editNameInput').value = currentUser.name;
        $('editProfileModal').classList.add('open');
    });
    $('profileSettingsBtn').addEventListener('click', () => switchSection('settingsSection'));
}

// ============ НАСТРОЙКИ ============
function loadSettings() {
    $('settingsContent').innerHTML = `
        <h3 style="color:var(--primary-light);margin-bottom:24px;">⚙️ настройки</h3>
        <div class="settings-item" id="setTheme"><span>🎨</span><span style="flex:1;">тема</span><span>${document.body.classList.contains('theme-light') ? 'светлая' : 'тёмная'}</span></div>
        <div class="settings-item" id="setLogout"><span>🚪</span><span style="flex:1;color:var(--accent);">выйти</span></div>`;
    $('setTheme').addEventListener('click', () => {
        document.body.classList.toggle('theme-light');
        localStorage.setItem('zc_theme', document.body.classList.contains('theme-light') ? 'light' : 'dark');
        loadSettings();
    });
    $('setLogout').addEventListener('click', () => { localStorage.removeItem('zocial_session'); location.reload(); });
}

// ============ ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ============
const origSwitch = switchSection;
switchSection = function(id) {
    origSwitch(id);
    if (id === 'feedSection') loadFeed();
    if (id === 'videoSection') loadVideos();
    if (id === 'bankSection') loadBank();
    if (id === 'messagesSection') loadChats();
    if (id === 'profileSection') loadProfile();
    if (id === 'settingsSection') loadSettings();
};

async function loadVideos() {
    $('videoGrid').innerHTML = '<div style="text-align:center;padding:40px;grid-column:1/-1;">видео появятся позже</div>';
}

// ============ ПОИСК ============
$('searchBtn').addEventListener('click', () => {
    const q = prompt('поиск по никнейму:');
    if (!q) return;
    api('GET', '/users').then(users => {
        const found = users.find(u => u.username?.includes(q.toLowerCase()));
        if (found) alert('@' + found.username + ': ' + (found.name || ''));
        else alert('не найден');
    });
});

$('addContactBtn').addEventListener('click', () => {
    const q = prompt('никнейм для чата:');
    if (!q || q === currentUser.username) return;
    openChat(q.toLowerCase());
});

// ============ РЕДАКТИРОВАНИЕ ПРОФИЛЯ ============
$('saveProfileBtn').addEventListener('click', () => {
    currentUser.name = $('editNameInput').value.trim() || currentUser.name;
    $('editProfileModal').classList.remove('open');
    loadProfile();
});
$('cancelEditProfileBtn').addEventListener('click', () => $('editProfileModal').classList.remove('open'));

// ============ ПЕРЕКЛЮЧАТЕЛЬ ВХОД/РЕГИСТРАЦИЯ ============
document.querySelectorAll('.login-tab').forEach(tab => {
    tab.addEventListener('click', function() {
        document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        document.querySelector('.login-tab-slider').classList.toggle('right', this.dataset.tab === 'register');
        $('loginFormBlock').classList.toggle('hidden', this.dataset.tab === 'register');
        $('registerFormBlock').classList.toggle('hidden', this.dataset.tab === 'login');
    });
});

$('loginSubmitBtn').addEventListener('click', login);
$('regSubmitBtn').addEventListener('click', register);

// ============ АВТОВХОД ============
(async () => {
    const theme = localStorage.getItem('zc_theme');
    if (theme === 'light') document.body.classList.add('theme-light');

    const session = localStorage.getItem('zocial_session');
    if (session) {
        try {
            const saved = JSON.parse(session);
            const result = await api('POST', '/login', { username: saved.username, password: '' });
            if (result.error) throw new Error('no session');
            currentUser = saved;
            showApp();
        } catch (e) {
            localStorage.removeItem('zocial_session');
            $('loginScreen').classList.remove('hidden');
        }
    } else {
        $('loginScreen').classList.remove('hidden');
    }
    $('loadingScreen').style.display = 'none';
})();
</script>
